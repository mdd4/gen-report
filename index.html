const storage = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? { value: v } : null; } catch(e){ return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch(e){} },
  delete: (k) => { try { localStorage.removeItem(k); } catch(e){} },
};

// Creator tokens — stored per device, keyed by job number
const CREATOR_TOKENS_KEY = "genreport-creator-tokens";
function getCreatorTokens() { try { const r = storage.get(CREATOR_TOKENS_KEY); return r ? JSON.parse(r.value) : {}; } catch(e){ return {}; } }
function saveCreatorToken(jobNum, token) { const t = getCreatorTokens(); t[jobNum] = token; storage.set(CREATOR_TOKENS_KEY, JSON.stringify(t)); }
function getCreatorToken(jobNum) { return getCreatorTokens()[jobNum] || null; }
function removeCreatorToken(jobNum) { const t = getCreatorTokens(); delete t[jobNum]; storage.set(CREATOR_TOKENS_KEY, JSON.stringify(t)); }

// ── Scroll Wheel ─────────────────────────────────────────
const HOURS   = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, "0"));
const MINUTES = Array.from({ length: 60 }, (_, i) => String(i).padStart(2, "0"));

function ScrollWheel({ items, value, onChange, width }) {
  const ref = useRef(null); const ih = 44; const tout = useRef(null); const usr = useRef(false);
  const idx = items.indexOf(value);
  useEffect(() => { if (ref.current && !usr.current) { const i = items.indexOf(value); if (i >= 0) ref.current.scrollTop = i * ih; } }, [value, items]);
  const onScroll = () => {
    usr.current = true; if (tout.current) clearTimeout(tout.current);
    tout.current = setTimeout(() => {
      if (ref.current) { const i = Math.max(0, Math.min(Math.round(ref.current.scrollTop / ih), items.length-1)); ref.current.scrollTo({ top:i*ih, behavior:"smooth" }); onChange(items[i]); }
      usr.current = false;
    }, 80);
  };
  return (
    <div className="relative" style={{ width:width||70, height:ih*3 }}>
      <div className="absolute inset-x-0 top-1/2 transform -translate-y-1/2 h-11 bg-blue-600 bg-opacity-20 border-t border-b border-blue-500 border-opacity-40 rounded pointer-events-none" style={{zIndex:10}} />
      <div ref={ref} onScroll={onScroll} className="h-full overflow-y-scroll no-scrollbar" style={{ scrollSnapType:"y mandatory", paddingTop:ih, paddingBottom:ih, WebkitOverflowScrolling:"touch" }}>
        {items.map((item,i) => (
          <div key={item} style={{ height:ih, scrollSnapAlign:"center" }}
            className={`flex items-center justify-center ${i===idx?"text-white text-xl font-bold":"text-gray-500 text-lg"}`}
            onClick={() => { onChange(item); if (ref.current) ref.current.scrollTo({ top:i*ih, behavior:"smooth" }); }}>
            {item}
          </div>
        ))}
      </div>
    </div>
  );
}

function TimePicker({ value, onChange, label }) {
  const [open, setOpen] = useState(false);
  const [hr, setHr] = useState("07"); const [min, setMin] = useState("00");
  const openP = () => { if (value) { setHr(value.split(":")[0]); setMin(value.split(":")[1]); } setOpen(true); };
  return (
    <div>
      <button onClick={openP} className={`w-full py-3 px-3 rounded-lg text-center text-lg font-mono ${value?"bg-gray-800 border border-blue-500 border-opacity-50 text-white":"bg-gray-800 border border-gray-700 text-gray-500"}`}>
        {value||"-- : --"}
      </button>
      {open && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-end justify-center" style={{zIndex:50}} onClick={(e)=>{ if(e.target===e.currentTarget) setOpen(false); }}>
          <div className="bg-gray-900 w-full rounded-t-2xl p-6 pb-8" style={{maxWidth:"32rem"}}>
            <div className="text-center text-sm text-gray-400 mb-2">{label}</div>
            <div className="text-center text-4xl font-mono font-bold text-white mb-6">{hr}:{min}</div>
            <div className="flex justify-center items-center gap-4 mb-8">
              <ScrollWheel items={HOURS} value={hr} onChange={setHr} width={90} />
              <span className="text-3xl font-bold text-gray-400">:</span>
              <ScrollWheel items={MINUTES} value={min} onChange={setMin} width={90} />
            </div>
            <div className="flex gap-3">
              <button onClick={()=>{ onChange(""); setOpen(false); }} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-400 font-medium">Clear</button>
              <button onClick={()=>setOpen(false)} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
              <button onClick={()=>{ onChange(`${hr}:${min}`); setOpen(false); }} className="flex-1 py-3 rounded-lg bg-blue-600 text-white font-medium">Set</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Helpers ───────────────────────────────────────────────
function todayISO() { return new Date().toISOString().slice(0,10); }
function fmtDate(iso) { if (!iso) return ""; const [y,m,d] = iso.split("-"); return `${m}/${d}/${y.slice(2)}`; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function makeToken() { return Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2); }

function buildReport(jobNum, g, mode) {
  const lines = [];
  if (jobNum) { lines.push(`Job # ${jobNum}`); lines.push(""); }
  if (g.xfmrNum) { lines.push(`Gen-${g.xfmrNum}`); if (g.gps) lines.push(`GPS ${g.gps}`); lines.push(""); }
  if (g.manufacturer && g.genNum && g.kw) { lines.push(`${g.manufacturer}: ${g.genNum}`); lines.push(`${g.kw}kW`); lines.push(""); }
  if (g.perp) { lines.push(`PERP: ${g.perp}`); lines.push(""); }
  const hasHours = g.startHours||(mode==="final"&&g.endHours);
  if (g.startHours) lines.push(`Start hours: ${g.startHours}`);
  if (mode==="final"&&g.endHours) lines.push(`End hours: ${g.endHours}`);
  if (hasHours) lines.push("");
  const hasFuel = g.startFuel||(mode==="final"&&g.endFuel);
  if (g.startFuel) lines.push(`Start fuel: ${g.startFuel}%`);
  if (mode==="final"&&g.endFuel) lines.push(`End fuel: ${g.endFuel}%`);
  if (hasFuel) lines.push("");
  const hasDEF = g.startDEF||(mode==="final"&&g.endDEF);
  if (g.startDEF) lines.push(`Start DEF: ${g.startDEF}%`);
  if (mode==="final"&&g.endDEF) lines.push(`End DEF: ${g.endDEF}%`);
  if (hasDEF) lines.push("");
  if (g.onlineTime&&g.onlineDate) { lines.push(`Online time: ${g.onlineTime}`); lines.push(`Date: ${fmtDate(g.onlineDate)}`); lines.push(""); }
  if (mode==="final"&&g.offlineTime&&g.offlineDate) { lines.push(`Offline time: ${g.offlineTime}`); lines.push(`Date: ${fmtDate(g.offlineDate)}`); }
  while (lines.length&&lines[lines.length-1]==="") lines.pop();
  return lines.join("\n");
}

function rowToGen(row) {
  return { id:row.id, xfmr:{ xfmrNum:row.xfmr_num||"", lat:row.lat||"", lon:row.lon||"", gps:row.gps||"" },
    gen:{ manufacturer:row.manufacturer||"", genNum:row.gen_num||"", kw:row.kw||"", perp:row.perp||"",
      startHours:row.start_hours||"", endHours:row.end_hours||"",
      startFuel:row.start_fuel||"", endFuel:row.end_fuel||"",
      startDEF:row.start_def||"", endDEF:row.end_def||"",
      onlineTime:row.online_time||"", onlineDate:row.online_date||todayISO(),
      offlineTime:row.offline_time||"", offlineDate:row.offline_date||todayISO() },
    mode:row.mode||"startup" };
}
function genToRow(jobNum, g) {
  return { id:g.id, job_num:jobNum, xfmr_num:g.xfmr.xfmrNum, lat:g.xfmr.lat, lon:g.xfmr.lon, gps:g.xfmr.gps,
    manufacturer:g.gen.manufacturer, gen_num:g.gen.genNum, kw:g.gen.kw, perp:g.gen.perp,
    start_hours:g.gen.startHours, end_hours:g.gen.endHours,
    start_fuel:g.gen.startFuel, end_fuel:g.gen.endFuel,
    start_def:g.gen.startDEF, end_def:g.gen.endDEF,
    online_time:g.gen.onlineTime, online_date:g.gen.onlineDate,
    offline_time:g.gen.offlineTime, offline_date:g.gen.offlineDate,
    mode:g.mode, updated_at:new Date().toISOString() };
}

function Field({ label, children }) {
  return <div><label className="block text-xs font-medium text-gray-400 mb-1 text-center">{label}</label>{children}</div>;
}
const ic = "w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-3 text-base text-gray-100 focus:outline-none focus:border-blue-500";

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const done = () => { setCopied(true); setTimeout(()=>setCopied(false),1400); };
    function fb() { const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); done(); }
    if (navigator.clipboard) { navigator.clipboard.writeText(text).then(done).catch(fb); } else { fb(); }
  };
  return <button onClick={copy} className={`w-full py-3 rounded-lg text-base font-semibold ${copied?"bg-green-600 text-white":"bg-blue-600 text-white"}`}>{copied?"✓ Copied!":"Copy Report"}</button>;
}

function Confirm({ message, onConfirm, onCancel, confirmLabel }) {
  return (
    <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center px-6" style={{zIndex:60}}>
      <div className="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full" style={{maxWidth:"24rem"}}>
        <p className="text-gray-200 text-base mb-5 text-center">{message}</p>
        <div className="flex gap-3">
          <button onClick={onCancel} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
          <button onClick={onConfirm} className="flex-1 py-3 rounded-lg bg-red-600 text-white font-medium">{confirmLabel||"Delete"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Defaults ──────────────────────────────────────────────
const EMPTY_XFMR = { xfmrNum:"", gps:"", lat:"", lon:"" };
const EMPTY_GEN  = { manufacturer:"", genNum:"", kw:"", perp:"", startHours:"", endHours:"", startFuel:"", endFuel:"", startDEF:"", endDEF:"", onlineTime:"", onlineDate:"", offlineTime:"", offlineDate:"" };
const LOCAL_JOBS_KEY = "genreport-jobs-index";
const jobKey = (id) => `genreport-job-${id}`;
const UI_KEY = "genreport-ui";

function newGenEntry() { return { id:genId(), xfmr:{...EMPTY_XFMR}, gen:{...EMPTY_GEN, onlineDate:todayISO(), offlineDate:todayISO()}, mode:"startup" }; }
function newLocalJob() { return { id:genId(), jobNum:"", gens:[newGenEntry()], activeGenIdx:0, created:Date.now(), type:"local" }; }
function genLabel(g, allGens) {
  if (!g.xfmr.xfmrNum) return "New";
  if (!allGens) return `Gen-${g.xfmr.xfmrNum}`;
  const matches = allGens.filter(x => x.xfmr.xfmrNum===g.xfmr.xfmrNum);
  if (matches.length<=1) return `Gen-${g.xfmr.xfmrNum}`;
  return `Gen-${g.xfmr.xfmrNum}(${matches.indexOf(g)+1})`;
}
function loadJobIndex() { try { const r=storage.get(LOCAL_JOBS_KEY); return r?JSON.parse(r.value):[]; } catch(e){ return []; } }
function saveJobIndex(idx) { storage.set(LOCAL_JOBS_KEY, JSON.stringify(idx)); }
function loadLocalJob(id) { try { const r=storage.get(jobKey(id)); return r?JSON.parse(r.value):null; } catch(e){ return null; } }
function saveLocalJob(job) { storage.set(jobKey(job.id), JSON.stringify(job)); }
function deleteLocalJobData(id) { storage.delete(jobKey(id)); }

// ── App ───────────────────────────────────────────────────
function App() {
  const [loaded,       setLoaded]       = useState(false);
  const [screen,       setScreen]       = useState("jobs");
  const [jobIndex,     setJobIndex]     = useState([]);
  const [activeJob,    setActiveJob]    = useState(null);
  const [tab,          setTab]          = useState(0);
  const [pickerOpen,   setPickerOpen]   = useState(false);
  const [confirmDel,   setConfirmDel]   = useState(null);
  const [cloudJobNum,  setCloudJobNum]  = useState("");
  const [cloudJoining, setCloudJoining] = useState(false);
  const [cloudError,   setCloudError]   = useState("");
  const [syncing,      setSyncing]      = useState(false);
  const [isAdmin,      setIsAdmin]      = useState(false);
  const [adminPrompt,  setAdminPrompt]  = useState(false);
  const [adminInput,   setAdminInput]   = useState("");
  const [adminError,   setAdminError]   = useState("");
  const [cloudJobs,    setCloudJobs]    = useState([]); // for admin view
  const syncRef = useRef({});

  useEffect(() => {
    const idx = loadJobIndex(); setJobIndex(idx);
    try {
      const ui = storage.get(UI_KEY);
      if (ui) { const { lastJobId, lastTab } = JSON.parse(ui.value); if (lastJobId) { const job=loadLocalJob(lastJobId); if (job) { setActiveJob(job); setScreen("entry"); setTab(lastTab||0); } } }
    } catch(e){}
    // Check if admin was previously unlocked this session
    const adminSess = storage.get("genreport-admin");
    if (adminSess && adminSess.value==="yes") setIsAdmin(true);
    setLoaded(true);
  }, []);

  useEffect(() => { if (!loaded) return; storage.set(UI_KEY, JSON.stringify({ lastJobId:activeJob?activeJob.id:null, lastTab:tab })); }, [activeJob,tab,loaded]);
  useEffect(() => {
    if (!loaded||!activeJob||activeJob.type==="cloud") return;
    saveLocalJob(activeJob);
    setJobIndex(idx => { const exists=idx.find(j=>j.id===activeJob.id); if (exists) { const u=idx.map(j=>j.id===activeJob.id?{...j,jobNum:activeJob.jobNum}:j); saveJobIndex(u); return u; } return idx; });
  }, [activeJob,loaded]);

  // Real-time cloud subscription
  useEffect(() => {
    if (!activeJob||activeJob.type!=="cloud") return;
    const jobNum = activeJob.jobNum;
    const channel = sb.channel(`job-${jobNum}`)
      .on("postgres_changes", { event:"*", schema:"public", table:"cloud_generators", filter:`job_num=eq.${jobNum}` }, (payload) => {
        if (payload.eventType==="INSERT"||payload.eventType==="UPDATE") {
          const incoming = rowToGen(payload.new);
          setActiveJob(j => { if (!j) return j; const exists=j.gens.find(g=>g.id===incoming.id); return { ...j, gens:exists?j.gens.map(g=>g.id===incoming.id?incoming:g):[...j.gens,incoming] }; });
        } else if (payload.eventType==="DELETE") {
          setActiveJob(j => { if (!j) return j; return { ...j, gens:j.gens.filter(g=>g.id!==payload.old.id) }; });
        }
      }).subscribe();
    return () => { sb.removeChannel(channel); };
  }, [activeJob?.jobNum, activeJob?.type]);

  // Join/create cloud job
  const joinCloudJob = async () => {
    if (!cloudJobNum.trim()) return;
    setCloudJoining(true); setCloudError("");
    try {
      const num = cloudJobNum.trim();
      // Check if job exists in cloud_jobs table
      const { data: jobData } = await sb.from("cloud_jobs").select("*").eq("job_num", num).single();
      let creatorToken = getCreatorToken(num);

      if (!jobData) {
        // New job — this device is the creator
        creatorToken = makeToken();
        await sb.from("cloud_jobs").insert({ job_num:num, creator_token:creatorToken });
        saveCreatorToken(num, creatorToken);
      }

      const { data: gens } = await sb.from("cloud_generators").select("*").eq("job_num", num);
      const genList = gens && gens.length>0 ? gens.map(rowToGen) : [newGenEntry()];
      if (gens && gens.length===0) {
        await sb.from("cloud_generators").insert(genToRow(num, genList[0]));
      }
      setActiveJob({ id:`cloud-${num}`, jobNum:num, gens:genList, activeGenIdx:0, type:"cloud", created:Date.now() });
      setScreen("entry"); setTab(0); setCloudJobNum("");
    } catch(e) { setCloudError("Could not connect. Check your internet and try again."); }
    setCloudJoining(false);
  };

  const syncCloudGen = useCallback(async (jobNum, gen) => {
    if (syncRef.current[gen.id]) clearTimeout(syncRef.current[gen.id]);
    syncRef.current[gen.id] = setTimeout(async () => {
      setSyncing(true);
      await sb.from("cloud_generators").upsert(genToRow(jobNum, gen));
      setSyncing(false);
    }, 800);
  }, []);

  // Admin login
  const tryAdmin = () => {
    if (adminInput===ADMIN_PASS) {
      setIsAdmin(true); storage.set("genreport-admin","yes");
      setAdminPrompt(false); setAdminInput(""); setAdminError("");
      loadCloudJobs();
    } else { setAdminError("Incorrect password"); }
  };
  const loadCloudJobs = async () => {
    const { data } = await sb.from("cloud_jobs").select("*").order("created_at", { ascending:false });
    setCloudJobs(data||[]);
  };
  const adminLogout = () => { setIsAdmin(false); storage.delete("genreport-admin"); setCloudJobs([]); };

  // Delete cloud job (admin or creator)
  const deleteCloudJob = async (jobNum) => {
    await sb.from("cloud_generators").delete().eq("job_num", jobNum);
    await sb.from("cloud_jobs").delete().eq("job_num", jobNum);
    removeCreatorToken(jobNum);
    if (isAdmin) loadCloudJobs();
    if (activeJob && activeJob.jobNum===jobNum) { setActiveJob(null); setScreen("jobs"); }
    setConfirmDel(null);
  };

  // Can this device delete this cloud job?
  const canDeleteCloudJob = (jobNum) => isAdmin || !!getCreatorToken(jobNum);

  // Local job actions
  const openJob = (id) => { const job=loadLocalJob(id); if (job) { setActiveJob(job); setScreen("entry"); setTab(0); } };
  const createLocalJob = () => {
    const job=newLocalJob(); saveLocalJob(job);
    const entry={id:job.id,jobNum:"",created:job.created,type:"local"};
    const newIdx=[entry,...jobIndex]; setJobIndex(newIdx); saveJobIndex(newIdx);
    setActiveJob(job); setScreen("entry"); setTab(0);
  };
  const doDeleteLocalJob = (id) => {
    deleteLocalJobData(id); const newIdx=jobIndex.filter(j=>j.id!==id); setJobIndex(newIdx); saveJobIndex(newIdx);
    if (activeJob&&activeJob.id===id) { setActiveJob(null); setScreen("jobs"); }
    setConfirmDel(null);
  };
  const goToJobs = () => setScreen("jobs");

  // Gen actions
  const safeGenIdx = activeJob ? Math.min(activeJob.activeGenIdx, activeJob.gens.length-1) : 0;
  const activeGen  = activeJob ? activeJob.gens[safeGenIdx] : null;
  const updateJob  = (patch) => setActiveJob(j=>({...j,...patch}));
  const updateGens = (fn) => setActiveJob(j=>({...j,gens:fn(j.gens)}));
  const updateActiveGen = (patch) => {
    setActiveJob(j => {
      const newGens = j.gens.map((g,i)=>i===safeGenIdx?{...g,...patch}:g);
      if (j.type==="cloud") syncCloudGen(j.jobNum, newGens[safeGenIdx]);
      return {...j,gens:newGens};
    });
  };
  const updateXfmr = (patch) => updateActiveGen({ xfmr:{...activeGen.xfmr,...patch} });
  const updateGen  = (patch) => updateActiveGen({ gen:{...activeGen.gen,...patch} });
  const setMode    = (mode)  => updateActiveGen({ mode });

  const addGen = async () => {
    const ng=newGenEntry(); updateGens(gs=>[...gs,ng]); updateJob({ activeGenIdx:activeJob.gens.length }); setPickerOpen(false);
    if (activeJob.type==="cloud") await sb.from("cloud_generators").insert(genToRow(activeJob.jobNum, ng));
  };
  const doDeleteGen = async (idx) => {
    const g=activeJob.gens[idx];
    updateGens(gs=>gs.filter((_,i)=>i!==idx));
    updateJob({ activeGenIdx:Math.max(0,Math.min(safeGenIdx,activeJob.gens.length-2)) });
    if (activeJob.type==="cloud") await sb.from("cloud_generators").delete().eq("id",g.id);
    setConfirmDel(null);
  };
  const clearGen = () => updateActiveGen({ gen:{...EMPTY_GEN,onlineDate:todayISO(),offlineDate:todayISO()}, mode:"startup" });

  const flatGen = activeGen ? { xfmrNum:activeGen.xfmr.xfmrNum, gps:activeGen.xfmr.gps, manufacturer:activeGen.gen.manufacturer, genNum:activeGen.gen.genNum, kw:activeGen.gen.kw, perp:activeGen.gen.perp, startHours:activeGen.gen.startHours, endHours:activeGen.gen.endHours, startFuel:activeGen.gen.startFuel, endFuel:activeGen.gen.endFuel, startDEF:activeGen.gen.startDEF, endDEF:activeGen.gen.endDEF, onlineTime:activeGen.gen.onlineTime, onlineDate:activeGen.gen.onlineDate, offlineTime:activeGen.gen.offlineTime, offlineDate:activeGen.gen.offlineDate } : {};
  const report = activeJob&&activeGen ? buildReport(activeJob.jobNum, flatGen, activeGen.mode) : "";
  const isCloud = activeJob&&activeJob.type==="cloud";

  if (!loaded) return <div className="min-h-screen flex items-center justify-center text-gray-400" style={{background:"#030712"}}>Loading...</div>;

  // ══ JOBS SCREEN ══════════════════════════════════════════
  if (screen==="jobs") return (
    <div className="min-h-screen text-gray-100 pb-24" style={{background:"#030712"}}>
      <div style={{maxWidth:"32rem",margin:"0 auto",padding:"1rem"}}>

        <div className="flex items-center justify-between mb-6">
          <h1 className="text-xl font-bold text-white">Gen Report</h1>
          <div className="flex items-center gap-2">
            {isAdmin
              ? <button onClick={adminLogout} className="text-xs text-red-400 px-3 py-1.5 bg-gray-800 rounded-lg">Logout Admin</button>
              : <button onClick={()=>setAdminPrompt(true)} className="text-xs text-gray-500 px-3 py-1.5 bg-gray-800 rounded-lg">Admin</button>
            }
            <button onClick={createLocalJob} className="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium">+ New Job</button>
          </div>
        </div>

        {/* Admin panel */}
        {isAdmin && (
          <div className="bg-gray-900 border border-yellow-800 rounded-lg p-4 mb-5">
            <div className="flex items-center justify-between mb-3">
              <span className="text-xs font-medium text-yellow-400">☆ Admin — All Cloud Jobs</span>
              <button onClick={loadCloudJobs} className="text-xs text-gray-400 px-2 py-1 bg-gray-800 rounded">Refresh</button>
            </div>
            {cloudJobs.length===0 && <div className="text-gray-600 text-xs">No cloud jobs found</div>}
            {cloudJobs.map(j => (
              <div key={j.job_num} className="flex items-center justify-between px-3 py-2 bg-gray-800 rounded-lg mb-1">
                <div>
                  <span className="font-mono font-bold text-sm text-white">{j.job_num}</span>
                  <span className="text-gray-500 text-xs ml-2">{new Date(j.created_at).toLocaleDateString()}</span>
                </div>
                <button onClick={() => setConfirmDel({ type:"cloudJob", jobNum:j.job_num })}
                  className="text-red-400 text-xs px-2 py-1 ml-2">✕ Delete</button>
              </div>
            ))}
          </div>
        )}

        {/* Cloud join */}
        <div className="bg-gray-900 border border-blue-900 rounded-lg p-4 mb-5">
          <div className="text-xs font-medium text-blue-400 mb-2">☁ Join Cloud Job (shared · real-time)</div>
          <div className="flex gap-2">
            <input className={ic+" flex-1"} value={cloudJobNum} onChange={e=>setCloudJobNum(e.target.value)}
              placeholder="Enter job number" inputMode="numeric" onKeyDown={e=>e.key==="Enter"&&joinCloudJob()} />
            <button onClick={joinCloudJob} disabled={cloudJoining}
              className="px-4 py-3 rounded-lg bg-blue-600 text-white text-sm font-medium flex-shrink-0">
              {cloudJoining?"...":"Join"}
            </button>
          </div>
          {cloudError && <div className="text-red-400 text-xs mt-2">{cloudError}</div>}
          <div className="text-xs text-gray-600 mt-2">First person to enter a job number creates it · anyone with the number joins</div>
        </div>

        {/* Local jobs */}
        {jobIndex.length>0 && <div className="text-xs font-medium text-gray-500 mb-2 uppercase tracking-widest">Local Jobs</div>}
        {jobIndex.length===0 && <div className="text-center py-10 text-gray-600 text-sm">No local jobs yet</div>}
        <div className="space-y-2">
          {jobIndex.map(j => (
            <div key={j.id} className="flex items-center bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
              <button className="flex-1 text-left px-4 py-4" onClick={()=>openJob(j.id)}>
                <div className="font-mono font-bold text-lg text-white">{j.jobNum||<span className="text-gray-600">No job number</span>}</div>
                <div className="text-xs text-gray-500 mt-0.5">{new Date(j.created).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
              </button>
              <button onClick={()=>setConfirmDel({type:"localJob",id:j.id,jobNum:j.jobNum})} className="px-4 py-4 text-red-400 text-sm border-l border-gray-800">✕</button>
            </div>
          ))}
        </div>

        {/* Recent cloud jobs this device created or joined */}
        {Object.keys(getCreatorTokens()).length>0 && !isAdmin && (
          <div className="mt-4">
            <div className="text-xs font-medium text-gray-500 mb-2 uppercase tracking-widest">My Cloud Jobs</div>
            {Object.keys(getCreatorTokens()).map(jobNum => (
              <div key={jobNum} className="flex items-center bg-gray-900 border border-gray-800 rounded-lg overflow-hidden mb-2">
                <button className="flex-1 text-left px-4 py-4" onClick={()=>{ setCloudJobNum(jobNum); }}>
                  <div className="font-mono font-bold text-lg text-white">{jobNum}</div>
                  <div className="text-xs text-blue-400 mt-0.5">☁ Cloud · You created this</div>
                </button>
                <button onClick={()=>setConfirmDel({type:"cloudJob",jobNum})} className="px-4 py-4 text-red-400 text-sm border-l border-gray-800">✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Admin login prompt */}
      {adminPrompt && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center px-6" style={{zIndex:60}}>
          <div className="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full" style={{maxWidth:"24rem"}}>
            <div className="text-center text-sm text-gray-400 mb-4">Admin Login</div>
            <input type="password" className={ic+" mb-2"} value={adminInput} onChange={e=>setAdminInput(e.target.value)}
              placeholder="Password" onKeyDown={e=>e.key==="Enter"&&tryAdmin()} autoFocus />
            {adminError && <div className="text-red-400 text-xs mb-2 text-center">{adminError}</div>}
            <div className="flex gap-3 mt-2">
              <button onClick={()=>{setAdminPrompt(false);setAdminInput("");setAdminError("");}} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
              <button onClick={tryAdmin} className="flex-1 py-3 rounded-lg bg-blue-600 text-white font-medium">Login</button>
            </div>
          </div>
        </div>
      )}

      {confirmDel && confirmDel.type==="localJob" && (
        <Confirm message={`Delete local job ${confirmDel.jobNum||"this job"}?`}
          onConfirm={()=>doDeleteLocalJob(confirmDel.id)} onCancel={()=>setConfirmDel(null)} />
      )}
      {confirmDel && confirmDel.type==="cloudJob" && (
        <Confirm message={`Delete cloud job ${confirmDel.jobNum}? All generators will be permanently removed.`}
          onConfirm={()=>deleteCloudJob(confirmDel.jobNum)} onCancel={()=>setConfirmDel(null)} />
      )}
    </div>
  );

  // ══ ENTRY SCREEN ═════════════════════════════════════════
  const TABS = ["Entry","Report"];
  return (
    <div className="min-h-screen text-gray-100 pb-24" style={{background:"#030712"}}>
      <div style={{maxWidth:"32rem",margin:"0 auto",padding:"1rem"}}>

        <div className="flex items-center gap-3 mb-4">
          <button onClick={goToJobs} className="text-gray-400 text-sm px-2 py-1 bg-gray-800 rounded-lg flex-shrink-0">← Jobs</button>
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-xs font-semibold tracking-widest uppercase text-gray-500">Job Number</span>
              {isCloud && <span className="text-xs px-2 py-0.5 rounded bg-blue-900 text-blue-300 font-medium">☁ {syncing?"saving...":"live"}</span>}
              {isCloud && canDeleteCloudJob(activeJob.jobNum) && (
                <button onClick={()=>setConfirmDel({type:"cloudJob",jobNum:activeJob.jobNum})}
                  className="text-xs text-red-400 px-2 py-0.5 bg-gray-800 rounded ml-auto">Delete Job</button>
              )}
            </div>
            <input
              className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-xl font-mono font-bold text-white focus:outline-none focus:border-blue-500 placeholder-gray-700"
              value={activeJob.jobNum} onChange={e=>updateJob({jobNum:e.target.value})}
              placeholder="261158" inputMode="numeric" maxLength={10} readOnly={isCloud} />
          </div>
        </div>

        <div className="flex gap-1 mb-5">
          {TABS.map((t,i) => (
            <button key={i} onClick={()=>setTab(i)}
              className={`flex-1 py-2 text-xs font-medium rounded-lg ${tab===i?"bg-blue-600 text-white":"bg-gray-800 text-gray-400"}`}>{t}</button>
          ))}
        </div>

        {tab===0 && activeGen && (
          <div className="space-y-4">
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-xs font-medium text-blue-400">Location</span>
                <div className="flex items-center gap-2">
                  <button onClick={()=>setPickerOpen(true)} className="flex items-center gap-2 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5">
                    <span className="font-mono font-bold text-sm text-white">{genLabel(activeGen,activeJob.gens)}</span>
                    <span className="text-gray-400 text-2xl leading-none">▾</span>
                  </button>
                  <button onClick={addGen} className="text-xs text-blue-400 font-medium px-2 py-1.5 bg-gray-800 border border-gray-700 rounded-lg">+ New</button>
                </div>
              </div>
              <div className="border-t border-gray-800 pt-3 grid grid-cols-3 gap-3">
                <Field label="Gen #">
                  <div className="flex gap-1 items-center">
                    <input className={ic+(activeGen.xfmr.xfmrNum?" opacity-70":"")} value={activeGen.xfmr.xfmrNum}
                      onChange={e=>updateXfmr({xfmrNum:e.target.value})} readOnly={!!activeGen.xfmr.xfmrNum} inputMode="numeric" />
                    {activeGen.xfmr.xfmrNum && <button onClick={()=>setConfirmDel({type:"editGenNum"})} className="text-gray-400 text-xs px-2 py-3 bg-gray-800 border border-gray-700 rounded-lg flex-shrink-0">Edit</button>}
                  </div>
                </Field>
                <Field label="Latitude">
                  <input className={ic} value={activeGen.xfmr.lat||""}
                    onChange={e=>{ const val=e.target.value; if(val.includes(",")){ const p=val.split(",").map(s=>s.trim()); updateXfmr({lat:p[0]||"",lon:p[1]||"",gps:p[0]&&p[1]?`${p[0]}, ${p[1]}`:""}); } else { updateXfmr({lat:val,gps:val&&activeGen.xfmr.lon?`${val}, ${activeGen.xfmr.lon}`:""}); } }}
                    inputMode="decimal" />
                </Field>
                <Field label="Longitude">
                  <input className={ic} value={activeGen.xfmr.lon||""}
                    onChange={e=>updateXfmr({lon:e.target.value,gps:activeGen.xfmr.lat&&e.target.value?`${activeGen.xfmr.lat}, ${e.target.value}`:""})}
                    inputMode="decimal" />
                </Field>
              </div>
            </div>

            <div className="flex gap-2">
              <button onClick={()=>setMode("startup")} className={`flex-1 py-2 rounded-lg text-sm font-medium border-2 ${activeGen.mode==="startup"?"bg-green-900 text-green-200 border-green-500":"bg-green-950 text-green-600 border-green-800"}`}>Online</button>
              <button onClick={()=>setMode("final")} className={`flex-1 py-2 rounded-lg text-sm font-medium border-2 ${activeGen.mode==="final"?"bg-red-900 text-red-200 border-red-500":"bg-red-950 text-red-600 border-red-800"}`}>Offline-Final</button>
            </div>

            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <Field label="Manufacturer / Rental Company"><input className={ic} value={activeGen.gen.manufacturer} onChange={e=>updateGen({manufacturer:e.target.value})} /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Generator Number"><input className={ic} value={activeGen.gen.genNum} onChange={e=>updateGen({genNum:e.target.value})} /></Field>
                <Field label="kW Rating"><input className={ic} value={activeGen.gen.kw} onChange={e=>updateGen({kw:e.target.value})} inputMode="numeric" /></Field>
              </div>
              <Field label="PERP # (CARB blue plate)"><input className={ic} value={activeGen.gen.perp} onChange={e=>updateGen({perp:e.target.value})} /></Field>
            </div>

            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <div className="text-xs font-medium text-green-400">Start Data</div>
              <div className="grid grid-cols-3 gap-2">
                <Field label="Start Hours"><input className={ic} value={activeGen.gen.startHours} onChange={e=>updateGen({startHours:e.target.value})} inputMode="decimal" /></Field>
                <Field label="Fuel %"><input className={ic} value={activeGen.gen.startFuel} onChange={e=>updateGen({startFuel:e.target.value})} inputMode="numeric" /></Field>
                <Field label="DEF %"><input className={ic} value={activeGen.gen.startDEF} onChange={e=>updateGen({startDEF:e.target.value})} inputMode="numeric" /></Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Online Time (24hr)"><TimePicker value={activeGen.gen.onlineTime} onChange={v=>updateGen({onlineTime:v})} label="Online Time" /></Field>
                <Field label="Online Date"><input type="date" className={ic} value={activeGen.gen.onlineDate} onChange={e=>updateGen({onlineDate:e.target.value})} /></Field>
              </div>
            </div>

            {activeGen.mode==="final" && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
                <div className="text-xs font-medium text-red-400">End Data</div>
                <div className="grid grid-cols-3 gap-2">
                  <Field label="End Hours"><input className={ic} value={activeGen.gen.endHours} onChange={e=>updateGen({endHours:e.target.value})} inputMode="decimal" /></Field>
                  <Field label="Fuel %"><input className={ic} value={activeGen.gen.endFuel} onChange={e=>updateGen({endFuel:e.target.value})} inputMode="numeric" /></Field>
                  <Field label="DEF %"><input className={ic} value={activeGen.gen.endDEF} onChange={e=>updateGen({endDEF:e.target.value})} inputMode="numeric" /></Field>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Offline Time (24hr)"><TimePicker value={activeGen.gen.offlineTime} onChange={v=>updateGen({offlineTime:v})} label="Offline Time" /></Field>
                  <Field label="Offline Date"><input type="date" className={ic} value={activeGen.gen.offlineDate} onChange={e=>updateGen({offlineDate:e.target.value})} /></Field>
                </div>
              </div>
            )}

            {activeJob.gens.length>1 && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-3 space-y-1">
                <div className="text-xs font-medium text-gray-500 mb-2">All Generators — <span className="font-mono text-gray-400">{activeJob.jobNum||"—"}</span>{isCloud&&<span className="ml-2 text-blue-400">☁</span>}</div>
                {activeJob.gens.map((g,i) => (
                  <div key={g.id} className={`flex items-center justify-between px-3 py-2 rounded-lg ${i===safeGenIdx?"bg-blue-600 bg-opacity-20 border border-blue-500 border-opacity-30":"bg-gray-800"}`}>
                    <button className="flex-1 text-left" onClick={()=>updateJob({activeGenIdx:i})}>
                      <span className={`font-mono font-bold text-sm ${i===safeGenIdx?"text-blue-300":"text-gray-200"}`}>{genLabel(g,activeJob.gens)}</span>
                      <span className={`ml-2 text-xs px-1.5 py-0.5 rounded ${g.mode==="final"?"bg-red-900 text-red-300":"bg-green-900 text-green-300"}`}>{g.mode==="final"?"Final":"Online"}</span>
                    </button>
                    <button onClick={()=>setConfirmDel({type:"gen",idx:i})} className="text-red-400 text-xs px-2 py-1 ml-1">✕</button>
                  </div>
                ))}
              </div>
            )}

            <button onClick={()=>setTab(1)} className="w-full py-3 rounded-lg bg-blue-600 text-white text-base font-medium">View Report →</button>
            <button onClick={clearGen} className="w-full py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-500 text-sm">Clear This Generator's Data</button>
          </div>
        )}

        {tab===1 && activeGen && (
          <div className="space-y-4">
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
              <div className="flex items-center justify-between mb-3">
                <span className="text-xs font-medium text-gray-400">{activeGen.mode==="final"?"Final":"Startup"} — {genLabel(activeGen,activeJob.gens)}</span>
                <span className="text-xs font-mono text-gray-600">{activeJob.jobNum||"—"}</span>
              </div>
              <pre className="text-sm text-gray-200 whitespace-pre-wrap font-mono leading-relaxed select-all">{report||"No data yet.\n\nFill in the Entry tab first."}</pre>
            </div>
            {report && <CopyButton text={report} />}
            {activeJob.gens.length>1 && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-3">
                <div className="text-xs font-medium text-gray-400 mb-2">Switch Generator</div>
                <div className="flex flex-wrap gap-2">
                  {activeJob.gens.map((g,i) => (
                    <button key={g.id} onClick={()=>updateJob({activeGenIdx:i})}
                      className={`px-3 py-2 rounded-lg text-sm font-mono font-medium ${i===safeGenIdx?"bg-blue-600 text-white":"bg-gray-800 text-gray-300"}`}>
                      {genLabel(g,activeJob.gens)}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <button onClick={()=>setTab(0)} className="w-full py-3 rounded-lg bg-gray-800 text-gray-300 text-base font-medium">← Edit Entry</button>
          </div>
        )}
      </div>

      {pickerOpen && activeJob && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-end justify-center" style={{zIndex:50}} onClick={(e)=>{ if(e.target===e.currentTarget) setPickerOpen(false); }}>
          <div className="bg-gray-900 w-full rounded-t-2xl p-4 pb-8" style={{maxWidth:"32rem",maxHeight:"80vh"}}>
            <div className="text-center text-sm text-gray-400 mb-1">Select Generator</div>
            <div className="text-center text-xs text-gray-600 mb-3 font-mono">Job {activeJob.jobNum||"—"}</div>
            <div className="overflow-y-auto space-y-1 no-scrollbar" style={{maxHeight:"52vh"}}>
              {activeJob.gens.map((g,i) => (
                <button key={g.id} onClick={()=>{ updateJob({activeGenIdx:i}); setPickerOpen(false); }}
                  className={`w-full flex items-center justify-between px-4 py-3 rounded-lg ${i===safeGenIdx?"bg-blue-600 bg-opacity-30 text-blue-300 border border-blue-500 border-opacity-50":"bg-gray-800 text-gray-300"}`}>
                  <span className="font-mono font-bold text-base">{genLabel(g,activeJob.gens)}</span>
                  <span className={`text-xs px-2 py-0.5 rounded ml-2 flex-shrink-0 ${g.mode==="final"?"bg-red-900 text-red-300":"bg-green-900 text-green-300"}`}>{g.mode==="final"?"Final":"Online"}</span>
                </button>
              ))}
            </div>
            <div className="flex gap-3 mt-3">
              <button onClick={()=>{ addGen(); setPickerOpen(false); }} className="flex-1 py-3 rounded-lg bg-blue-600 bg-opacity-20 border border-blue-500 border-opacity-30 text-blue-300 font-medium">+ Add Generator</button>
              <button onClick={()=>setPickerOpen(false)} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Close</button>
            </div>
          </div>
        </div>
      )}

      {confirmDel && confirmDel.type==="editGenNum" && <Confirm message="Clear the Gen # so you can edit it?" confirmLabel="Clear" onConfirm={()=>{ updateXfmr({xfmrNum:""}); setConfirmDel(null); }} onCancel={()=>setConfirmDel(null)} />}
      {confirmDel && confirmDel.type==="gen" && <Confirm message={`Delete ${genLabel(activeJob.gens[confirmDel.idx],activeJob.gens)}?`} onConfirm={()=>doDeleteGen(confirmDel.idx)} onCancel={()=>setConfirmDel(null)} />}
      {confirmDel && confirmDel.type==="cloudJob" && <Confirm message={`Delete cloud job ${confirmDel.jobNum}? All generators will be permanently removed.`} onConfirm={()=>deleteCloudJob(confirmDel.jobNum)} onCancel={()=>setConfirmDel(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
