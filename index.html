// ── Scroll Wheel ──────────────────────────────────────────
const HOURS   = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, "0"));
const MINUTES = Array.from({ length: 60 }, (_, i) => String(i).padStart(2, "0"));

function ScrollWheel({ items, value, onChange, width }) {
  const ref  = useRef(null);
  const ih   = 44;
  const tout = useRef(null);
  const usr  = useRef(false);
  const idx  = items.indexOf(value);

  useEffect(() => {
    if (ref.current && !usr.current) {
      const i = items.indexOf(value);
      if (i >= 0) ref.current.scrollTop = i * ih;
    }
  }, [value, items]);

  const onScroll = () => {
    usr.current = true;
    clearTimeout(tout.current);
    tout.current = setTimeout(() => {
      if (ref.current) {
        const i = Math.max(0, Math.min(Math.round(ref.current.scrollTop / ih), items.length - 1));
        ref.current.scrollTo({ top: i * ih, behavior: "smooth" });
        onChange(items[i]);
      }
      usr.current = false;
    }, 80);
  };

  return (
    <div className="relative" style={{ width: width || 70, height: ih * 3 }}>
      <div className="absolute inset-x-0 top-1/2 transform -translate-y-1/2 h-11 bg-blue-600 bg-opacity-20 border-t border-b border-blue-500 border-opacity-40 rounded pointer-events-none" style={{zIndex:10}} />
      <div ref={ref} onScroll={onScroll} className="h-full overflow-y-scroll no-scrollbar"
        style={{ scrollSnapType: "y mandatory", paddingTop: ih, paddingBottom: ih, WebkitOverflowScrolling: "touch" }}>
        {items.map((item, i) => (
          <div key={item} style={{ height: ih, scrollSnapAlign: "center" }}
            className={`flex items-center justify-center ${i === idx ? "text-white text-xl font-bold" : "text-gray-500 text-lg"}`}
            onClick={() => { onChange(item); if (ref.current) ref.current.scrollTo({ top: i * ih, behavior: "smooth" }); }}>
            {item}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Time Picker ───────────────────────────────────────────
function TimePicker({ value, onChange, label }) {
  const [open, setOpen] = useState(false);
  const [hr,   setHr]   = useState("07");
  const [min,  setMin]  = useState("00");

  const openPicker = () => {
    if (value) { setHr(value.split(":")[0]); setMin(value.split(":")[1]); }
    setOpen(true);
  };

  return (
    <div>
      <button onClick={openPicker}
        className={`w-full py-3 px-3 rounded-lg text-center text-lg font-mono ${value ? "bg-gray-800 border border-blue-500 border-opacity-50 text-white" : "bg-gray-800 border border-gray-700 text-gray-500"}`}>
        {value || "-- : --"}
      </button>
      {open && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-end justify-center" style={{zIndex:50}}
          onClick={(e) => { if (e.target === e.currentTarget) setOpen(false); }}>
          <div className="bg-gray-900 w-full rounded-t-2xl p-6 pb-8" style={{maxWidth:"32rem"}}>
            <div className="text-center text-sm text-gray-400 mb-2">{label}</div>
            <div className="text-center text-4xl font-mono font-bold text-white mb-6">{hr}:{min}</div>
            <div className="flex justify-center items-center gap-4 mb-8">
              <ScrollWheel items={HOURS}   value={hr}  onChange={setHr}  width={90} />
              <span className="text-3xl font-bold text-gray-400">:</span>
              <ScrollWheel items={MINUTES} value={min} onChange={setMin} width={90} />
            </div>
            <div className="flex gap-3">
              <button onClick={() => { onChange(""); setOpen(false); }} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-400 font-medium">Clear</button>
              <button onClick={() => setOpen(false)}                    className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
              <button onClick={() => { onChange(`${hr}:${min}`); setOpen(false); }} className="flex-1 py-3 rounded-lg bg-blue-600 text-white font-medium">Set</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Helpers ───────────────────────────────────────────────
const todayISO = () => new Date().toISOString().slice(0, 10);
const fmtDate  = (iso) => { if (!iso) return ""; const [y,m,d] = iso.split("-"); return `${m}/${d}/${y.slice(2)}`; };
const newId    = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const newToken = () => Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);

function buildReport(jobNum, g, mode) {
  const L = [];
  if (jobNum)                               { L.push(`Job # ${jobNum}`); L.push(""); }
  if (g.xfmrNum)                            { L.push(`Location ${g.xfmrNum}`); if (g.gps) L.push(`GPS ${g.gps}`); L.push(""); }
  if (g.manufacturer && g.genNum && g.kw)   { L.push(`${g.manufacturer}: ${g.genNum}`); L.push(`${g.kw}kW`); L.push(""); }
  if (g.perp)                               { L.push(`PERP: ${g.perp}`); L.push(""); }

  const hasHours = g.startHours || (mode === "final" && g.endHours);
  if (g.startHours)                         L.push(`Start hours: ${g.startHours}`);
  if (mode === "final" && g.endHours)       L.push(`End hours: ${g.endHours}`);
  if (hasHours)                             L.push("");

  const hasFuel = g.startFuel || (mode === "final" && g.endFuel);
  if (g.startFuel)                          L.push(`Start fuel: ${g.startFuel}%`);
  if (mode === "final" && g.endFuel)        L.push(`End fuel: ${g.endFuel}%`);
  if (hasFuel)                              L.push("");

  const hasDEF = g.startDEF || (mode === "final" && g.endDEF);
  if (g.startDEF)                           L.push(`Start DEF: ${g.startDEF}%`);
  if (mode === "final" && g.endDEF)         L.push(`End DEF: ${g.endDEF}%`);
  if (hasDEF)                               L.push("");

  if (g.onlineTime && g.onlineDate)         { L.push(`Online time: ${g.onlineTime}`); L.push(`Date: ${fmtDate(g.onlineDate)}`); L.push(""); }
  if (mode === "final" && g.offlineTime && g.offlineDate) { L.push(`Offline time: ${g.offlineTime}`); L.push(`Date: ${fmtDate(g.offlineDate)}`); }

  while (L.length && L[L.length - 1] === "") L.pop();
  return L.join("\n");
}

// ── DB helpers ────────────────────────────────────────────
function rowToGen(row) {
  return {
    id: row.id,
    xfmr: { xfmrNum: row.xfmr_num || "", lat: row.lat || "", lon: row.lon || "", gps: row.gps || "" },
    gen: {
      manufacturer: row.manufacturer || "", genNum: row.gen_num || "", kw: row.kw || "", perp: row.perp || "",
      startHours: row.start_hours || "", endHours: row.end_hours || "",
      startFuel:  row.start_fuel  || "", endFuel:  row.end_fuel  || "",
      startDEF:   row.start_def   || "", endDEF:   row.end_def   || "",
      onlineTime:  row.online_time  || "", onlineDate:  row.online_date  || todayISO(),
      offlineTime: row.offline_time || "", offlineDate: row.offline_date || todayISO(),
    },
    mode: row.mode || "startup",
  };
}

function genToRow(jobNum, g) {
  return {
    id: g.id, job_num: jobNum,
    xfmr_num: g.xfmr.xfmrNum, lat: g.xfmr.lat, lon: g.xfmr.lon, gps: g.xfmr.gps,
    manufacturer: g.gen.manufacturer, gen_num: g.gen.genNum, kw: g.gen.kw, perp: g.gen.perp,
    start_hours: g.gen.startHours, end_hours: g.gen.endHours,
    start_fuel:  g.gen.startFuel,  end_fuel:  g.gen.endFuel,
    start_def:   g.gen.startDEF,   end_def:   g.gen.endDEF,
    online_time:  g.gen.onlineTime,  online_date:  g.gen.onlineDate,
    offline_time: g.gen.offlineTime, offline_date: g.gen.offlineDate,
    mode: g.mode, updated_at: new Date().toISOString(),
  };
}

// ── Shared Components ─────────────────────────────────────
function Field({ label, children }) {
  return (
    <div>
      <label className="block text-xs font-medium text-gray-400 mb-1 text-center">{label}</label>
      {children}
    </div>
  );
}

const ic = "w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-3 text-base text-gray-100 focus:outline-none focus:border-blue-500";

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1400); };
    const fallback = () => { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); done(); };
    navigator.clipboard ? navigator.clipboard.writeText(text).then(done).catch(fallback) : fallback();
  };
  return (
    <button onClick={copy} className={`w-full py-3 rounded-lg text-base font-semibold ${copied ? "bg-green-600 text-white" : "bg-blue-600 text-white"}`}>
      {copied ? "✓ Copied!" : "Copy Report"}
    </button>
  );
}

function Confirm({ message, onConfirm, onCancel, confirmLabel }) {

    <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center px-6" style={{zIndex:60}}>

        <p className="text-gray-200 text-base mb-5 text-center">{message}</p>
        <div className="flex gap-3">
          <button onClick={onCancel}  className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
          <button onClick={onConfirm} className="flex-1 py-3 rounded-lg bg-red-600 text-white font-medium">{confirmLabel || "Delete"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Data defaults ─────────────────────────────────────────
const EMPTY_XFMR = { xfmrNum: "", gps: "", lat: "", lon: "" };
const EMPTY_GEN  = {
  manufacturer: "", genNum: "", kw: "", perp: "",
  startHours: "", endHours: "", startFuel: "", endFuel: "", startDEF: "", endDEF: "",
  onlineTime: "", onlineDate: "", offlineTime: "", offlineDate: "",
};

const newGenEntry = () => ({ id: newId(), xfmr: { ...EMPTY_XFMR }, gen: { ...EMPTY_GEN, onlineDate: todayISO(), offlineDate: todayISO() }, mode: "startup" });
const newLocalJob = () => ({ id: newId(), jobNum: "", gens: [newGenEntry()], activeGenIdx: 0, created: Date.now(), type: "local" });

function genLabel(g, allGens) {
  if (!allGens) return "Location";
  const idx = allGens.indexOf(g);
  return idx >= 0 ? `Location ${idx + 1}` : "Location";
}

// ── Storage keys ──────────────────────────────────────────
const JOB_INDEX_KEY = "gr-job-index";
const jobKey        = (id) => `gr-job-${id}`;
const UI_KEY        = "gr-ui";

const loadJobIndex  = ()    => ls.get(JOB_INDEX_KEY) || [];
const saveJobIndex  = (idx) => ls.set(JOB_INDEX_KEY, idx);
const loadLocalJob  = (id)  => ls.get(jobKey(id));
const saveLocalJob  = (job) => ls.set(jobKey(job.id), job);
const deleteJobData = (id)  => ls.del(jobKey(id));

// ── App ───────────────────────────────────────────────────
function App() {
  const [loaded,       setLoaded]       = useState(false);
  const [screen,       setScreen]       = useState("jobs");
  const [jobIndex,     setJobIndex]     = useState([]);
  const [activeJob,    setActiveJob]    = useState(null);
  const [tab,          setTab]          = useState(0);
  const [pickerOpen,   setPickerOpen]   = useState(false);
  const [confirm,      setConfirm]      = useState(null);
  const [cloudNum,     setCloudNum]     = useState("");
  const [cloudLoading, setCloudLoading] = useState(false);
  const [cloudError,   setCloudError]   = useState("");
  const [syncing,      setSyncing]      = useState(false);
  const [isAdmin,      setIsAdmin]      = useState(false);
  const [adminPrompt,  setAdminPrompt]  = useState(false);
  const [adminInput,   setAdminInput]   = useState("");
  const [adminError,   setAdminError]   = useState("");
  const [cloudJobs,    setCloudJobs]    = useState([]);
  const [scanState,    setScanState]    = useState(null);
  const [scanTarget,   setScanTarget]   = useState(null);
  const [scanPreview,  setScanPreview]  = useState(null);
  const [scanResult,   setScanResult]   = useState(null);
  const [importOpen,   setImportOpen]   = useState(false);
  const [importText,   setImportText]   = useState("");
  const [importParsing,setImportParsing]= useState(false);
  const [importPreview,setImportPreview]= useState(null);
  const [importError,  setImportError]  = useState("");
  const [lastJobId,    setLastJobId]    = useState(null);
  const [lastTab,      setLastTab]      = useState(0);
  const cameraInputRef = useRef(null);
  const syncTimers = useRef({});

  // ── Load on mount ──
  useEffect(() => {
    setJobIndex(loadJobIndex());
    const ui = ls.get(UI_KEY);
    if (ui?.lastJobId) {
      const job = loadLocalJob(ui.lastJobId);
      if (job) { setActiveJob(job); setLastJobId(ui.lastJobId); setLastTab(ui.lastTab || 0); }
    }
    if (ls.get("gr-admin") === "yes") setIsAdmin(true);
    setLoaded(true);
  }, []);

  // ── Persist UI state ──
  useEffect(() => {
    if (!loaded) return;
    ls.set(UI_KEY, { lastJobId: activeJob?.id || null, lastTab: tab });
    if (activeJob?.id) setLastJobId(activeJob.id);
    setLastTab(tab);
  }, [activeJob, tab, loaded]);

  // ── Persist local job ──
  useEffect(() => {
    if (!loaded || !activeJob || activeJob.type === "cloud") return;
    saveLocalJob(activeJob);
    setJobIndex(idx => {
      const updated = idx.find(j => j.id === activeJob.id)
        ? idx.map(j => j.id === activeJob.id ? { ...j, jobNum: activeJob.jobNum } : j)
        : idx;
      saveJobIndex(updated);
      return updated;
    });
  }, [activeJob, loaded]);

  // ── Real-time cloud subscription ──
  useEffect(() => {
    if (!activeJob || activeJob.type !== "cloud") return;
    const jobNum = activeJob.jobNum;
    const ch = sb.channel(`job-${jobNum}`)
      .on("postgres_changes", { event: "*", schema: "public", table: "cloud_generators", filter: `job_num=eq.${jobNum}` }, (payload) => {
        if (payload.eventType === "INSERT" || payload.eventType === "UPDATE") {
          const g = rowToGen(payload.new);
          setActiveJob(j => { if (!j) return j; const exists = j.gens.find(x => x.id === g.id); return { ...j, gens: exists ? j.gens.map(x => x.id === g.id ? g : x) : [...j.gens, g] }; });
        } else if (payload.eventType === "DELETE") {
          setActiveJob(j => j ? { ...j, gens: j.gens.filter(x => x.id !== payload.old.id) } : j);
        }
      }).subscribe();
    return () => sb.removeChannel(ch);
  }, [activeJob?.jobNum, activeJob?.type]);

  // ── Cloud: join/create ──
  const joinCloud = async () => {
    if (!cloudNum.trim()) return;
    setCloudLoading(true); setCloudError("");
    try {
      const num = cloudNum.trim();
      const { data: jobData } = await sb.from("cloud_jobs").select("*").eq("job_num", num).single();
      if (!jobData) {
        const token = newToken();
        await sb.from("cloud_jobs").insert({ job_num: num, creator_token: token });
        saveToken(num, token);
      }
      const { data: rows } = await sb.from("cloud_generators").select("*").eq("job_num", num);
      let gens = rows && rows.length > 0 ? rows.map(rowToGen) : [newGenEntry()];
      if (!rows || rows.length === 0) await sb.from("cloud_generators").insert(genToRow(num, gens[0]));
      setActiveJob({ id: `cloud-${num}`, jobNum: num, gens, activeGenIdx: 0, type: "cloud", created: Date.now() });
      setScreen("entry"); setTab(0); setCloudNum("");
    } catch(e) { setCloudError("Could not connect. Check your internet and try again."); }
    setCloudLoading(false);
  };

  // ── Cloud: sync gen ──
  const syncGen = useCallback((jobNum, gen) => {
    clearTimeout(syncTimers.current[gen.id]);
    syncTimers.current[gen.id] = setTimeout(async () => {
      setSyncing(true);
      await sb.from("cloud_generators").upsert(genToRow(jobNum, gen));
      setSyncing(false);
    }, 800);
  }, []);

  // ── Import: regex parser (no API needed) ──
  const runImportParse = () => {
    if (!importText.trim()) return;
    setImportParsing(true);
    setImportError("");
    setImportPreview(null);

    try {
      const text = importText;

      // ── Job number: first standalone 6-digit number ──
      const jobNumMatch = text.match(/\b(\d{6})\b/);
      const jobNum = jobNumMatch ? jobNumMatch[1] : "";
      if (!jobNum) throw new Error("No job number found");

      // ── Detect vendor from material list ──
      // Look for "Generator" lines with a vendor at the end e.g. "United Rentals"
      const vendorMatch = text.match(/\d+\s*(?:KW|kW|kw)[^\n]*?Generator[^\n]*?[-–]\s*([A-Za-z][\w\s&]+?)(?:\n|$)/);
      // Also try the table format: "Vendor\nUnited Rentals" or inline
      const vendorLineMatch = text.match(/(?:^|\n)(\d+)\s*\n?(100KW|65KW|32KW|125KW|[\d]+KW)\s+Generator[^\n]*\n([A-Za-z][\w\s&]{2,30})\n/i);
      // Simpler: scan for known vendors
      const KNOWN_VENDORS = ["United Rentals", "Aggreko", "Caterpillar", "CAT", "Generac", "Cummins", "Atlas Copco", "Multiquip", "Kohler"];
      let detectedVendor = "";
      for (const v of KNOWN_VENDORS) {
        if (text.includes(v)) { detectedVendor = v; break; }
      }

      // ── Parse generators ──
      // Format A: "XFMR - N" blocks (new format)
      // Format B: "Location N –" blocks (old format)
      const gens = [];

      // Try Format A: XFMR blocks
      const xfmrBlocks = text.split(/XFMR\s*-\s*\d+/i).slice(1);
      if (xfmrBlocks.length > 0) {
        for (const block of xfmrBlocks) {
          // XFMR number: line after "XFMR #" label
          const xfmrMatch = block.match(/XFMR\s*#\s*\n?(\d+)/i) || block.match(/^[\s\S]*?(\d{12,})/);
          const xfmrNum = xfmrMatch ? xfmrMatch[1].trim() : "";

          // kW: from "1\n100KW Generator" or "1 100KW Generator"
          const kwMatch = block.match(/\b(\d+)\s*KW\s+Generator/i);
          const kw = kwMatch ? kwMatch[1] : "";

          // GPS: "lat, lon" on its own line or after "GPS Coordinates"
          const gpsMatch = block.match(/(-?\d{2,3}\.\d+),\s*(-?\d{2,3}\.\d+)/);
          const lat = gpsMatch ? gpsMatch[1] : "";
          const lon = gpsMatch ? gpsMatch[2] : "";

          if (xfmrNum) gens.push({ xfmrNum, kw, lat, lon, vendor: detectedVendor });
        }
      }

      // Try Format B: Location blocks (fallback)
      if (gens.length === 0) {
        const locBlocks = text.split(/Location\s+\d+\s*[–-]/i).slice(1);
        for (const block of locBlocks) {
          const xfmrMatch = block.match(/XFMR\s*#\s*(\S+)/i);
          const xfmrNum = xfmrMatch ? xfmrMatch[1].replace(/\s/g, "") : "";

          const kwMatch = block.match(/\b(\d+)\s*KW\s+Generator/i);
          const kw = kwMatch ? kwMatch[1] : "";

          // GPS from maps URL
          const mapsMatch = block.match(/maps\?q=(-?\d+\.\d+),(-?\d+\.\d+)/);
          // Or plain coords
          const coordMatch = block.match(/(-?\d{2,3}\.\d+),\s*(-?\d{2,3}\.\d+)/);
          const lat = (mapsMatch || coordMatch)?.[1] || "";
          const lon = (mapsMatch || coordMatch)?.[2] || "";

          if (xfmrNum) gens.push({ xfmrNum, kw, lat, lon, vendor: detectedVendor });
        }
      }

      if (gens.length === 0) throw new Error("No generators found");

      setImportPreview({ jobNum, gens });
    } catch(e) {
      setImportError("Could not parse. Make sure you pasted the full job summary including the XFMR sections.");
    }
    setImportParsing(false);
  };

  const createImportedJob = () => {
    if (!importPreview) return;
    const gens = importPreview.gens.map(g => {
      const entry = newGenEntry();
      entry.xfmr.xfmrNum      = g.xfmrNum || "";
      entry.gen.kw             = g.kw || "";
      entry.gen.manufacturer   = g.vendor || "";
      if (g.lat && g.lon) {
        entry.xfmr.lat = g.lat;
        entry.xfmr.lon = g.lon;
        entry.xfmr.gps = `${g.lat}, ${g.lon}`;
      }
      return entry;
    });
    const job = { id: newId(), jobNum: importPreview.jobNum, gens, activeGenIdx: 0, created: Date.now(), type: "local" };
    saveLocalJob(job);
    const idx = [{ id: job.id, jobNum: job.jobNum, created: job.created, type: "local" }, ...jobIndex];
    setJobIndex(idx);
    saveJobIndex(idx);
    setActiveJob(job);
    setLastJobId(job.id);
    setLastTab(0);
    setScreen("entry");
    setTab(0);
    setImportOpen(false);
    setImportText("");
    setImportPreview(null);

  // ── Vision scan ──
  const SCAN_PROMPTS = {
    nameplate: `You are reading a generator nameplate or rental tag. Extract these fields if visible:
- manufacturer (company name, e.g. "United Rentals", "Aggreko", "Caterpillar", "Generac", "Cummins")
- genNum (unit/serial/asset number, often labeled "Unit #", "Asset #", "Serial #", or similar)
- kw (kilowatt rating, number only, e.g. "150")
- perp (PERP number from CARB blue plate, labeled "PERP #" or "PERP No")
Respond ONLY with valid JSON like: {"manufacturer":"","genNum":"","kw":"","perp":""}
Omit any field you cannot read clearly. Do not guess.`,
    hours: `You are reading a generator hour meter or digital display. Extract:
- startHours (engine hours shown, decimal ok, e.g. "4521.3")
- startFuel (fuel level percentage if visible, number only, e.g. "85")
- startDEF (DEF/AdBlue level percentage if visible, number only, e.g. "100")
Respond ONLY with valid JSON like: {"startHours":"","startFuel":"","startDEF":""}
Omit any field you cannot read clearly. Do not guess.`,
    endhours: `You are reading a generator hour meter or digital display at shutdown. Extract:
- endHours (engine hours shown, decimal ok, e.g. "4521.3")
- endFuel (fuel level percentage if visible, number only, e.g. "85")
- endDEF (DEF/AdBlue level percentage if visible, number only, e.g. "100")
Respond ONLY with valid JSON like: {"endHours":"","endFuel":"","endDEF":""}
Omit any field you cannot read clearly. Do not guess.`,
  };

  const triggerScan = (target) => {
    setScanTarget(target);
    setScanState(null);
    setScanPreview(null);
    setScanResult(null);
    if (cameraInputRef.current) {
      cameraInputRef.current.value = "";
      cameraInputRef.current.click();
    }
  };

  const handleImageCapture = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setScanState("scanning");
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      setScanPreview(dataUrl);
      const base64 = dataUrl.split(",")[1];
      const mediaType = file.type || "image/jpeg";
      try {
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 300,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
                { type: "text", text: SCAN_PROMPTS[scanTarget] }
              ]
            }]
          })
        });
        const data = await resp.json();
        const text = data.content?.find(c => c.type === "text")?.text || "";
        const clean = text.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);
        setScanResult(parsed);
        setScanState("done");
      } catch(err) {
        setScanState("error");
      }
    };
    reader.readAsDataURL(file);
  };

  const applyScanResult = () => {

    if (scanTarget === "nameplate") {
      const patch = {};
      if (scanResult.manufacturer) patch.manufacturer = scanResult.manufacturer;
      if (scanResult.genNum)       patch.genNum       = scanResult.genNum;

      if (scanResult.perp)         patch.perp         = scanResult.perp;
      updateGen(patch);
    } else if (scanTarget === "hours") {
      const patch = {};
      if (scanResult.startHours) patch.startHours = scanResult.startHours;
      if (scanResult.startFuel)  patch.startFuel  = scanResult.startFuel;
      if (scanResult.startDEF)   patch.startDEF   = scanResult.startDEF;
      updateGen(patch);
    } else if (scanTarget === "endhours") {
      const patch = {};
      if (scanResult.endHours) patch.endHours = scanResult.endHours;
      if (scanResult.endFuel)  patch.endFuel  = scanResult.endFuel;
      if (scanResult.endDEF)   patch.endDEF   = scanResult.endDEF;
      updateGen(patch);
    }
    setScanState(null);
    setScanPreview(null);
    setScanResult(null);
  };

    setConfirm(null);
  };

  const canDeleteCloud = (jobNum) => isAdmin || !!getToken(jobNum);

  // ── Local job actions ──
  const openJob = (id) => { const job = loadLocalJob(id); if (job) { setActiveJob(job); setLastJobId(id); setLastTab(0); setScreen("entry"); setTab(0); } };
  const createJob = () => {
    const job = newLocalJob(); saveLocalJob(job);
    const idx = [{ id: job.id, jobNum: "", created: job.created, type: "local" }, ...jobIndex];
    setJobIndex(idx); saveJobIndex(idx); setActiveJob(job); setLastJobId(job.id); setLastTab(0); setScreen("entry"); setTab(0);
  };
  const deleteLocalJob = (id) => {
    deleteJobData(id);
    const idx = jobIndex.filter(j => j.id !== id); setJobIndex(idx); saveJobIndex(idx);
    if (lastJobId === id) setLastJobId(null);
    if (activeJob?.id === id) { setActiveJob(null); setScreen("jobs"); }
    setConfirm(null);
  };

  // ── Gen actions ──
  const safeIdx   = activeJob ? Math.min(activeJob.activeGenIdx, activeJob.gens.length - 1) : 0;
  const activeGen = activeJob?.gens[safeIdx] || null;

  const updateJob  = (patch) => setActiveJob(j => ({ ...j, ...patch }));
  const updateGens = (fn)    => setActiveJob(j => ({ ...j, gens: fn(j.gens) }));
  const patchActiveGen = (patch) => {
    setActiveJob(j => {
      const gens = j.gens.map((g, i) => i === safeIdx ? { ...g, ...patch } : g);
      if (j.type === "cloud") syncGen(j.jobNum, gens[safeIdx]);
      return { ...j, gens };
    });
  };
  const updateXfmr = (patch) => patchActiveGen({ xfmr: { ...activeGen.xfmr, ...patch } });
  const updateGen  = (patch) => patchActiveGen({ gen:  { ...activeGen.gen,  ...patch } });
  const setMode    = (mode)  => patchActiveGen({ mode });

  const addGen = async () => {
    const g = newGenEntry();
    updateGens(gs => [...gs, g]);
    updateJob({ activeGenIdx: activeJob.gens.length });
    setPickerOpen(false);
    if (activeJob.type === "cloud") await sb.from("cloud_generators").insert(genToRow(activeJob.jobNum, g));
  };

  const deleteGen = async (idx) => {
    const g = activeJob.gens[idx];
    updateGens(gs => gs.filter((_, i) => i !== idx));
    updateJob({ activeGenIdx: Math.max(0, Math.min(safeIdx, activeJob.gens.length - 2)) });
    if (activeJob.type === "cloud") await sb.from("cloud_generators").delete().eq("id", g.id);
    setConfirm(null);
  };

  const clearGen = () => patchActiveGen({ gen: { ...EMPTY_GEN, onlineDate: todayISO(), offlineDate: todayISO() }, mode: "startup" });

  const flatGen = activeGen ? {
    xfmrNum: activeGen.xfmr.xfmrNum, gps: activeGen.xfmr.gps,
    manufacturer: activeGen.gen.manufacturer, genNum: activeGen.gen.genNum,
    kw: activeGen.gen.kw, perp: activeGen.gen.perp,
    startHours: activeGen.gen.startHours, endHours: activeGen.gen.endHours,
    startFuel:  activeGen.gen.startFuel,  endFuel:  activeGen.gen.endFuel,
    startDEF:   activeGen.gen.startDEF,   endDEF:   activeGen.gen.endDEF,
    onlineTime:  activeGen.gen.onlineTime,  onlineDate:  activeGen.gen.onlineDate,
    offlineTime: activeGen.gen.offlineTime, offlineDate: activeGen.gen.offlineDate,
  } : {};

  const report  = activeJob && activeGen ? buildReport(activeJob.jobNum, flatGen, activeGen.mode) : "";
  const isCloud = activeJob?.type === "cloud";
  const myTokens = Object.keys(getTokens());

  if (!loaded) return <div className="min-h-screen flex items-center justify-center text-gray-400" style={{background:"#030712"}}>Loading...</div>;

  // ════════════════════════════════════════════════════════
  // JOBS SCREEN
  // ════════════════════════════════════════════════════════
  if (screen === "jobs") return (
    <div className="min-h-screen text-gray-100 pb-24" style={{background:"#030712"}}>
      <div style={{maxWidth:"32rem", margin:"0 auto", padding:"1rem"}}>

        {/* Header */}
        <div className="flex items-center justify-between mb-6">
          <h1 className="text-xl font-bold text-white">Gen Report</h1>
          <div className="flex items-center gap-2">
            {isAdmin
              ? <button onClick={adminLogout} className="text-xs text-red-400 px-3 py-1.5 bg-gray-800 rounded-lg">Logout Admin</button>
              : <button onClick={() => setAdminPrompt(true)} className="text-xs text-gray-500 px-3 py-1.5 bg-gray-800 rounded-lg">Admin</button>
            }
            <button onClick={() => { setImportOpen(true); setImportText(""); setImportPreview(null); setImportError(""); }}
              className="px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white text-sm font-medium">⬇ Import</button>
            <button onClick={createJob} className="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium">+ New Job</button>
          </div>
        </div>

        {/* Import modal */}
        {importOpen && (
          <div className="fixed inset-0 bg-black bg-opacity-90 flex flex-col items-end justify-start" style={{zIndex:60}}>
            <div className="bg-gray-950 border-l border-gray-800 w-full h-full overflow-y-auto no-scrollbar" style={{maxWidth:"32rem"}}>
              <div className="p-5 pb-12">
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <div className="text-base font-bold text-white">Import Job Summary</div>
                    <div className="text-xs text-gray-500 mt-0.5">Paste the full PG&E job dispatch</div>
                  </div>
                  <button onClick={() => setImportOpen(false)} className="text-gray-400 text-xl px-2">✕</button>
                </div>

                {!importPreview ? (
                  <div className="space-y-3">
                    <textarea
                      className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-3 text-sm text-gray-200 focus:outline-none focus:border-blue-500 font-mono leading-relaxed"
                      style={{minHeight:"260px", resize:"none"}}
                      value={importText}
                      onChange={e => { setImportText(e.target.value); setImportError(""); }}
                      placeholder={"Cloverdale\n42088 N. River Rd\n261383\n\nLocation 1 – 42088 River Rd\nXFMR # 217142942236\nView on Google Maps\n1 65KW Generator...\n\n...paste full job summary here"}
                    />
                    {importError && <div className="text-red-400 text-xs px-1">{importError}</div>}
                    <button onClick={runImportParse} disabled={importParsing || !importText.trim()}
                      className={`w-full py-3 rounded-lg text-base font-semibold flex items-center justify-center gap-2 ${importParsing || !importText.trim() ? "bg-gray-800 text-gray-500" : "bg-blue-600 text-white"}`}>
                      {importParsing

                      </div>

                    </div>

                )}

        {/* Admin panel */}

            {cloudJobs.length === 0 && <div className="text-gray-600 text-xs">No cloud jobs found</div>}
            {cloudJobs.map(j => (

                <div>
                  <span className="font-mono font-bold text-sm text-white">{j.job_num}</span>
                  <span className="text-gray-500 text-xs ml-2">{new Date(j.created_at).toLocaleDateString()}</span>
                </div>
                <button onClick={() => setConfirm({ type: "cloudJob", jobNum: j.job_num })} className="text-red-400 text-xs px-2 py-1">✕ Delete</button>
              </div>
            ))}
          </div>

        {/* Cloud join */}
        <div className="bg-gray-900 border border-blue-900 rounded-lg p-4 mb-5">
          <div className="text-xs font-medium text-blue-400 mb-2">☁ Join Cloud Job — shared · real-time</div>
          <div className="flex gap-2">
            <input className={ic + " flex-1"} value={cloudNum} onChange={e => setCloudNum(e.target.value)}
              placeholder="Enter job number" inputMode="numeric"
              onKeyDown={e => e.key === "Enter" && joinCloud()} />
            <button onClick={joinCloud} disabled={cloudLoading}
              className="px-4 py-3 rounded-lg bg-blue-600 text-white text-sm font-medium flex-shrink-0">

        </div>

        {/* My cloud jobs (creator) */}
        {myTokens.length > 0 && !isAdmin && (
          <div className="mb-4">
            <div className="text-xs font-medium text-gray-500 mb-2 uppercase tracking-widest">My Cloud Jobs</div>
            {myTokens.map(jobNum => (
              <div key={jobNum} className="flex items-center bg-gray-900 border border-gray-800 rounded-lg overflow-hidden mb-2">
                <button className="flex-1 text-left px-4 py-4" onClick={() => { setCloudNum(jobNum); }}>
                  <div className="font-mono font-bold text-lg text-white">{jobNum}</div>
                  <div className="text-xs text-blue-400 mt-0.5">☁ Cloud · Creator</div>
                </button>
                <button onClick={() => setConfirm({ type: "cloudJob", jobNum })} className="px-4 py-4 text-red-400 text-sm border-l border-gray-800">✕</button>
              </div>
            ))}
          </div>
        )}

        {/* Local jobs */}
        {jobIndex.length > 0 && <div className="text-xs font-medium text-gray-500 mb-2 uppercase tracking-widest">Local Jobs</div>}
        {jobIndex.length === 0 && myTokens.length === 0 && <div className="text-center py-10 text-gray-600 text-sm">No jobs yet</div>}
        <div className="space-y-2">
          {jobIndex.map(j => {
            const isLast = j.id === lastJobId;
            return (
              <div key={j.id} className={`flex items-center rounded-lg overflow-hidden border ${isLast ? "bg-blue-950 border-blue-700" : "bg-gray-900 border-gray-800"}`}>
                <button className="flex-1 text-left px-4 py-4" onClick={() => { if (isLast) { setScreen("entry"); setTab(lastTab); } else { openJob(j.id); } }}>
                  <div className="flex items-center gap-2">
                    <span className="font-mono font-bold text-lg text-white">{j.jobNum || <span className="text-gray-600">No job number</span>}</span>
                    {isLast && <span className="text-xs px-2 py-0.5 rounded-full bg-blue-600 text-white font-medium">Continue →</span>}
                  </div>
                  <div className="text-xs text-gray-500 mt-0.5">{new Date(j.created).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</div>
                </button>
                <button onClick={() => setConfirm({ type: "localJob", id: j.id, jobNum: j.jobNum })} className="px-4 py-4 text-red-400 text-sm border-l border-gray-800">✕</button>
              </div>
            );
          })}
        </div>
      </div>

      {/* Admin login */}
      {adminPrompt && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center px-6" style={{zIndex:60}}>
          <div className="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full" style={{maxWidth:"24rem"}}>
            <div className="text-center text-sm text-gray-400 mb-4">Admin Login</div>
            <input type="password" className={ic + " mb-2"} value={adminInput} onChange={e => setAdminInput(e.target.value)}
              placeholder="Password" onKeyDown={e => e.key === "Enter" && tryAdmin()} autoFocus />
            {adminError && <div className="text-red-400 text-xs mb-2 text-center">{adminError}</div>}
            <div className="flex gap-3 mt-2">
              <button onClick={() => { setAdminPrompt(false); setAdminInput(""); setAdminError(""); }} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
              <button onClick={tryAdmin} className="flex-1 py-3 rounded-lg bg-blue-600 text-white font-medium">Login</button>
            </div>
          </div>
        </div>
      )}

      {confirm?.type === "localJob"  && <Confirm message={`Delete job ${confirm.jobNum || "this job"}?`} onConfirm={() => deleteLocalJob(confirm.id)} onCancel={() => setConfirm(null)} />}
      {confirm?.type === "cloudJob"  && <Confirm message={`Delete cloud job ${confirm.jobNum}? All generators will be permanently removed.`} onConfirm={() => deleteCloudJob(confirm.jobNum)} onCancel={() => setConfirm(null)} />}
    </div>
  );

  // ════════════════════════════════════════════════════════
  // ENTRY SCREEN
  // ════════════════════════════════════════════════════════
  return (
    <div className="min-h-screen text-gray-100 pb-24" style={{background:"#030712"}}>
      {/* Hidden camera input */}
      <input ref={cameraInputRef} type="file" accept="image/*"
        onChange={handleImageCapture} style={{display:"none"}} />

      {/* Scan overlay */}
      {scanState && (
        <div className="fixed inset-0 bg-black bg-opacity-90 flex flex-col items-center justify-center px-6" style={{zIndex:70}}>
          <div className="bg-gray-900 border border-gray-700 rounded-2xl p-5 w-full" style={{maxWidth:"24rem"}}>
            {scanState === "scanning" && (
              <div className="flex flex-col items-center gap-4 py-4">
                {scanPreview && <img src={scanPreview} alt="scan" className="w-full rounded-lg object-cover" style={{maxHeight:"180px"}} />}
                <div className="flex items-center gap-2 text-blue-400">
                  <svg className="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                  <span className="text-sm font-medium">Reading image...</span>
                </div>
              </div>
            )}
            {scanState === "error" && (
              <div className="flex flex-col items-center gap-4 py-2">
                <div className="text-red-400 text-sm text-center">Could not read the image. Try again with better lighting or a clearer angle.</div>
                <button onClick={() => setScanState(null)} className="w-full py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Close</button>
              </div>
            )}
            {scanState === "done" && scanResult && (
              <div className="space-y-3">
                <div className="text-sm font-medium text-white text-center mb-1">Review Scan Results</div>
                {scanPreview && <img src={scanPreview} alt="scan" className="w-full rounded-lg object-cover" style={{maxHeight:"140px"}} />}
                <div className="bg-gray-800 rounded-lg p-3 space-y-1">
                  {Object.entries(scanResult).filter(([,v]) => v).map(([k,v]) => (
                    <div key={k} className="flex justify-between items-center text-sm">
                      <span className="text-gray-400 capitalize">{k.replace(/([A-Z])/g," $1").trim()}</span>
                      <span className="text-white font-mono font-medium">{v}</span>
                    </div>
                  ))}
                  {Object.values(scanResult).every(v => !v) && <div className="text-gray-500 text-xs text-center">No values detected — try a clearer photo</div>}
                </div>
                <div className="flex gap-2">
                  <button onClick={() => { setScanState(null); setScanPreview(null); setScanResult(null); }} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium text-sm">Discard</button>
                  <button onClick={applyScanResult} className="flex-1 py-3 rounded-lg bg-blue-600 text-white font-medium text-sm">Apply Fields</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{maxWidth:"32rem", margin:"0 auto", padding:"1rem"}}>

        {/* Header */}
        <div className="flex items-center gap-3 mb-4">
          <button onClick={() => setScreen("jobs")} className="text-gray-400 text-sm px-2 py-1 bg-gray-800 rounded-lg flex-shrink-0">← Jobs</button>
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-xs font-semibold tracking-widest uppercase text-gray-500">Job Number</span>
              {isCloud && <span className="text-xs px-2 py-0.5 rounded bg-blue-900 text-blue-300 font-medium">☁ {syncing ? "saving..." : "live"}</span>}
              {isCloud && canDeleteCloud(activeJob.jobNum) && (
                <button onClick={() => setConfirm({ type: "cloudJob", jobNum: activeJob.jobNum })} className="text-xs text-red-400 px-2 py-0.5 bg-gray-800 rounded ml-auto">Delete Job</button>
              )}
            </div>
            <input
              className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-xl font-mono font-bold text-white focus:outline-none focus:border-blue-500 placeholder-gray-700"
              value={activeJob.jobNum} onChange={e => updateJob({ jobNum: e.target.value })}
              placeholder="261158" inputMode="numeric" maxLength={10} readOnly={isCloud} />
          </div>
        </div>

        {/* Tabs */}
        <div className="flex gap-1 mb-5">
          {["Entry", "Report"].map((t, i) => (
            <button key={i} onClick={() => setTab(i)}
              className={`flex-1 py-2 text-xs font-medium rounded-lg ${tab === i ? "bg-blue-600 text-white" : "bg-gray-800 text-gray-400"}`}>
              {t}
            </button>
          ))}
        </div>

        {/* ── Entry Tab ── */}
        {tab === 0 && activeGen && (
          <div className="space-y-4">

            {/* Location block */}
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-xs font-medium text-blue-400">Location</span>
                <div className="flex items-center gap-2">
                  <button onClick={() => setPickerOpen(true)} className="flex items-center gap-2 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5">
                    <span className="font-mono font-bold text-sm text-white">{genLabel(activeGen, activeJob.gens)}</span>
                    <span className="text-gray-400 text-2xl leading-none">▾</span>
                  </button>
                  <button onClick={addGen} className="text-xs text-blue-400 font-medium px-2 py-1.5 bg-gray-800 border border-gray-700 rounded-lg">+ New</button>
                </div>
              </div>
              <div className="border-t border-gray-800 pt-3 grid grid-cols-3 gap-3">
                <Field label="Location #">
                  <div className="flex gap-1 items-center">
                    <input className={ic + (activeGen.xfmr.xfmrNum ? " opacity-70" : "")}
                      value={activeGen.xfmr.xfmrNum}
                      onChange={e => updateXfmr({ xfmrNum: e.target.value })}
                      readOnly={!!activeGen.xfmr.xfmrNum} inputMode="numeric" />
                    {activeGen.xfmr.xfmrNum && (
                      <button onClick={() => setConfirm({ type: "editGenNum" })}
                        className="text-gray-400 text-xs px-2 py-3 bg-gray-800 border border-gray-700 rounded-lg flex-shrink-0">Edit</button>
                    )}
                  </div>
                </Field>
                <Field label="Latitude">
                  <input className={ic} value={activeGen.xfmr.lat || ""}
                    onChange={e => {
                      const val = e.target.value;
                      if (val.includes(",")) {
                        const [lat, lon] = val.split(",").map(s => s.trim());
                        updateXfmr({ lat: lat || "", lon: lon || "", gps: lat && lon ? `${lat}, ${lon}` : "" });
                      } else {
                        updateXfmr({ lat: val, gps: val && activeGen.xfmr.lon ? `${val}, ${activeGen.xfmr.lon}` : "" });
                      }
                    }}
                    inputMode="decimal" />
                </Field>
                <Field label="Longitude">
                  <input className={ic} value={activeGen.xfmr.lon || ""}
                    onChange={e => updateXfmr({ lon: e.target.value, gps: activeGen.xfmr.lat && e.target.value ? `${activeGen.xfmr.lat}, ${e.target.value}` : "" })}
                    inputMode="decimal" />
                </Field>
              </div>
            </div>

            {/* Mode toggle */}
            <div className="flex gap-2">
              <button onClick={() => setMode("startup")}
                className={`flex-1 py-2 rounded-lg text-sm font-medium border-2 ${activeGen.mode === "startup" ? "bg-green-900 text-green-200 border-green-500" : "bg-green-950 text-green-600 border-green-800"}`}>
                Online
              </button>
              <button onClick={() => setMode("final")}
                className={`flex-1 py-2 rounded-lg text-sm font-medium border-2 ${activeGen.mode === "final" ? "bg-red-900 text-red-200 border-red-500" : "bg-red-950 text-red-600 border-red-800"}`}>
                Offline-Final
              </button>
            </div>

            {/* Generator info */}
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-xs font-medium text-gray-500">Generator Info</span>
                <CamBtn target="nameplate" label="generator info" />
              </div>
              <Field label="Manufacturer / Rental Company">
                <input className={ic} value={activeGen.gen.manufacturer} onChange={e => updateGen({ manufacturer: e.target.value })} />
              </Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Generator Number">
                  <input className={ic} value={activeGen.gen.genNum} onChange={e => updateGen({ genNum: e.target.value })} />
                </Field>
                <Field label="kW Rating">
                  <input className={ic} value={activeGen.gen.kw} onChange={e => updateGen({ kw: e.target.value })} inputMode="numeric" />
                </Field>
              </div>
              <Field label="PERP # (CARB blue plate)">
                <input className={ic} value={activeGen.gen.perp} onChange={e => updateGen({ perp: e.target.value })} />
              </Field>
            </div>

            {/* Start data */}
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <div className="flex items-center justify-between">
                <div className="text-xs font-medium text-green-400">Start Data</div>
                <CamBtn target="hours" label="start hours/fuel/DEF" />
              </div>
              <div className="grid grid-cols-3 gap-2">
                <Field label="Start Hours"><input className={ic} value={activeGen.gen.startHours} onChange={e => updateGen({ startHours: e.target.value })} inputMode="decimal" /></Field>
                <Field label="Fuel %">      <input className={ic} value={activeGen.gen.startFuel}  onChange={e => updateGen({ startFuel:  e.target.value })} inputMode="numeric" /></Field>
                <Field label="DEF %">       <input className={ic} value={activeGen.gen.startDEF}   onChange={e => updateGen({ startDEF:   e.target.value })} inputMode="numeric" /></Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Online Time (24hr)">
                  <div className="flex gap-1">
                    <div className="flex-1"><TimePicker value={activeGen.gen.onlineTime} onChange={v => updateGen({ onlineTime: v })} label="Online Time" /></div>
                    <button onClick={() => { const n = new Date(); updateGen({ onlineTime: String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0") }); }}
                      className="px-2 py-3 rounded-lg bg-gray-800 border border-gray-700 text-xs text-blue-400 font-medium flex-shrink-0">Now</button>
                  </div>
                </Field>
                <Field label="Online Date">
                  <div className="flex gap-1">
                    <input type="date" className={ic + " flex-1"} value={activeGen.gen.onlineDate} onChange={e => updateGen({ onlineDate: e.target.value })} />
                    <button onClick={() => updateGen({ onlineDate: todayISO() })}
                      className="px-2 py-3 rounded-lg bg-gray-800 border border-gray-700 text-xs text-blue-400 font-medium flex-shrink-0">Today</button>
                  </div>
                </Field>
              </div>
            </div>

            {/* End data */}
            {activeGen.mode === "final" && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
                <div className="flex items-center justify-between">
                  <div className="text-xs font-medium text-red-400">End Data</div>
                  <CamBtn target="endhours" label="end hours/fuel/DEF" />
                </div>
                <div className="grid grid-cols-3 gap-2">
                  <Field label="End Hours"><input className={ic} value={activeGen.gen.endHours} onChange={e => updateGen({ endHours: e.target.value })} inputMode="decimal" /></Field>
                  <Field label="Fuel %">   <input className={ic} value={activeGen.gen.endFuel}  onChange={e => updateGen({ endFuel:  e.target.value })} inputMode="numeric" /></Field>
                  <Field label="DEF %">    <input className={ic} value={activeGen.gen.endDEF}   onChange={e => updateGen({ endDEF:   e.target.value })} inputMode="numeric" /></Field>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Offline Time (24hr)">
                    <div className="flex gap-1">
                      <div className="flex-1"><TimePicker value={activeGen.gen.offlineTime} onChange={v => updateGen({ offlineTime: v })} label="Offline Time" /></div>
                      <button onClick={() => { const n = new Date(); updateGen({ offlineTime: String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0") }); }}
                        className="px-2 py-3 rounded-lg bg-gray-800 border border-gray-700 text-xs text-blue-400 font-medium flex-shrink-0">Now</button>
                    </div>
                  </Field>
                  <Field label="Offline Date">
                    <div className="flex gap-1">
                      <input type="date" className={ic + " flex-1"} value={activeGen.gen.offlineDate} onChange={e => updateGen({ offlineDate: e.target.value })} />
                      <button onClick={() => updateGen({ offlineDate: todayISO() })}
                        className="px-2 py-3 rounded-lg bg-gray-800 border border-gray-700 text-xs text-blue-400 font-medium flex-shrink-0">Today</button>
                    </div>
                  </Field>
                </div>
              </div>
            )}

            {/* All gens list */}
            {activeJob.gens.length > 1 && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-3 space-y-1">
                <div className="text-xs font-medium text-gray-500 mb-2">
                  All Generators — <span className="font-mono text-gray-400">{activeJob.jobNum || "—"}</span>
                  {isCloud && <span className="ml-2 text-blue-400">☁</span>}
                </div>
                {activeJob.gens.map((g, i) => (
                  <div key={g.id} className={`flex items-center justify-between px-3 py-2 rounded-lg ${i === safeIdx ? "bg-blue-600 bg-opacity-20 border border-blue-500 border-opacity-30" : "bg-gray-800"}`}>
                    <button className="flex-1 text-left" onClick={() => updateJob({ activeGenIdx: i })}>
                      <span className={`font-mono font-bold text-sm ${i === safeIdx ? "text-blue-300" : "text-gray-200"}`}>{genLabel(g, activeJob.gens)}</span>
                      <span className={`ml-2 text-xs px-1.5 py-0.5 rounded ${g.mode === "final" ? "bg-red-900 text-red-300" : "bg-green-900 text-green-300"}`}>{g.mode === "final" ? "Final" : "Online"}</span>
                    </button>
                    <button onClick={() => setConfirm({ type: "gen", idx: i })} className="text-red-400 text-xs px-2 py-1 ml-1">✕</button>
                  </div>
                ))}
              </div>
            )}

            <button onClick={() => setTab(1)} className="w-full py-3 rounded-lg bg-blue-600 text-white text-base font-medium">View Report →</button>
            <button onClick={clearGen} className="w-full py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-500 text-sm">Clear This Generator's Data</button>
          </div>
        )}

        {/* ── Report Tab ── */}
        {tab === 1 && activeGen && (
          <div className="space-y-4">
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
              <div className="flex items-center justify-between mb-3">
                <span className="text-xs font-medium text-gray-400">{activeGen.mode === "final" ? "Final" : "Startup"} — {genLabel(activeGen, activeJob.gens)}</span>
                <span className="text-xs font-mono text-gray-600">{activeJob.jobNum || "—"}</span>
              </div>
              <pre className="text-sm text-gray-200 whitespace-pre-wrap font-mono leading-relaxed select-all">{report || "No data yet.\n\nFill in the Entry tab first."}</pre>
            </div>
            {report && <CopyButton text={report} />}
            {activeJob.gens.length > 1 && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-3">
                <div className="text-xs font-medium text-gray-400 mb-2">Switch Generator</div>
                <div className="flex flex-wrap gap-2">
                  {activeJob.gens.map((g, i) => (
                    <button key={g.id} onClick={() => updateJob({ activeGenIdx: i })}
                      className={`px-3 py-2 rounded-lg text-sm font-mono font-medium ${i === safeIdx ? "bg-blue-600 text-white" : "bg-gray-800 text-gray-300"}`}>
                      {genLabel(g, activeJob.gens)}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <button onClick={() => setTab(0)} className="w-full py-3 rounded-lg bg-gray-800 text-gray-300 text-base font-medium">← Edit Entry</button>
          </div>
        )}
      </div>

      {/* Gen picker sheet */}
      {pickerOpen && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-end justify-center" style={{zIndex:50}}
          onClick={(e) => { if (e.target === e.currentTarget) setPickerOpen(false); }}>
          <div className="bg-gray-900 w-full rounded-t-2xl p-4 pb-8" style={{maxWidth:"32rem", maxHeight:"80vh"}}>
            <div className="text-center text-sm text-gray-400 mb-1">Select Generator</div>
            <div className="text-center text-xs text-gray-600 mb-3 font-mono">Job {activeJob.jobNum || "—"}</div>
            <div className="overflow-y-auto space-y-1 no-scrollbar" style={{maxHeight:"52vh"}}>
              {activeJob.gens.map((g, i) => (
                <button key={g.id} onClick={() => { updateJob({ activeGenIdx: i }); setPickerOpen(false); }}
                  className={`w-full flex items-center justify-between px-4 py-3 rounded-lg ${i === safeIdx ? "bg-blue-600 bg-opacity-30 text-blue-300 border border-blue-500 border-opacity-50" : "bg-gray-800 text-gray-300"}`}>
                  <span className="font-mono font-bold text-base">{genLabel(g, activeJob.gens)}</span>
                  <span className={`text-xs px-2 py-0.5 rounded ml-2 flex-shrink-0 ${g.mode === "final" ? "bg-red-900 text-red-300" : "bg-green-900 text-green-300"}`}>{g.mode === "final" ? "Final" : "Online"}</span>
                </button>
              ))}
            </div>
            <div className="flex gap-3 mt-3">
              <button onClick={addGen} className="flex-1 py-3 rounded-lg bg-blue-600 bg-opacity-20 border border-blue-500 border-opacity-30 text-blue-300 font-medium">+ Add Generator</button>
              <button onClick={() => setPickerOpen(false)} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Close</button>
            </div>
          </div>
        </div>
      )}

      {confirm?.type === "editGenNum" && <Confirm message="Clear the Location # so you can edit it?" confirmLabel="Clear" onConfirm={() => { updateXfmr({ xfmrNum: "" }); setConfirm(null); }} onCancel={() => setConfirm(null)} />}
      {confirm?.type === "gen"        && <Confirm message={`Delete ${genLabel(activeJob.gens[confirm.idx], activeJob.gens)}?`} onConfirm={() => deleteGen(confirm.idx)} onCancel={() => setConfirm(null)} />}
      {confirm?.type === "cloudJob"   && <Confirm message={`Delete cloud job ${confirm.jobNum}? All generators will be permanently removed.`} onConfirm={() => deleteCloudJob(confirm.jobNum)} onCancel={() => setConfirm(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
