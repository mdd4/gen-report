function ScrollWheel({ items, value, onChange, width }) {
  const ref = useRef(null); const ih = 44; const tout = useRef(null); const usr = useRef(false);
  const idx = items.indexOf(value);
  useEffect(() => { if (ref.current && !usr.current) { const i = items.indexOf(value); if (i >= 0) ref.current.scrollTop = i * ih; } }, [value, items]);
  const onScroll = () => {
    usr.current = true; clearTimeout(tout.current);
    tout.current = setTimeout(() => {
      if (ref.current) { const i = Math.max(0, Math.min(Math.round(ref.current.scrollTop / ih), items.length-1)); ref.current.scrollTo({ top:i*ih, behavior:"smooth" }); onChange(items[i]); }
      usr.current = false;
    }, 80);
  };
  return (
    <div className="relative" style={{ width:width||70, height:ih*3 }}>
      <div className="absolute inset-x-0 top-1/2 transform -translate-y-1/2 h-11 bg-blue-600 bg-opacity-20 border-t border-b border-blue-500 border-opacity-40 rounded pointer-events-none" style={{zIndex:10}} />
      <div ref={ref} onScroll={onScroll} className="h-full overflow-y-scroll no-scrollbar" style={{ scrollSnapType:"y mandatory", paddingTop:ih, paddingBottom:ih, WebkitOverflowScrolling:"touch" }}>
        {items.map((item,i) => (
          <div key={item} style={{ height:ih, scrollSnapAlign:"center" }}
            className={`flex items-center justify-center ${i===idx?"text-white text-xl font-bold":"text-gray-500 text-lg"}`}
            onClick={() => { onChange(item); if (ref.current) ref.current.scrollTo({ top:i*ih, behavior:"smooth" }); }}>
            {item}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Helpers ───────────────────────────────────────────────
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate  = (iso) => { if (!iso) return ""; const [y,m,d] = iso.split("-"); return `${m}/${d}/${y.slice(2)}`; };
const newId    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const newToken = () => Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);

// ── Report builder — matches Job Summary format exactly ───
function buildReport(jobNum, xfmr, gen, mode) {
  const L = [];
  const date = gen.onlineDate || todayISO();
  const [y,m,d] = date.split("-");
  const yy = y.slice(2);

  // Title line: YY MMDD JOBNUM PGE ADDRESS
  if (jobNum) { L.push(jobNum); L.push(""); }

  if (xfmr.xfmrNum) {
    if (xfmr.gps) L.push(`Location-${xfmr.xfmrNum}  GPS ${xfmr.gps}`);
    else L.push(`Location-${xfmr.xfmrNum}`);
    L.push("");
  }

  if (gen.manufacturer && gen.genNum && gen.kw) { L.push(`${gen.manufacturer}: ${gen.genNum} - ${gen.kw}kW`); L.push(""); }

  if (gen.perp) { L.push(`PERP: ${gen.perp}`); L.push(""); }

  const hasHours = gen.startHours || (mode==="final" && gen.endHours);
  if (gen.startHours) L.push(`Start hours: ${gen.startHours}`);
  if (mode==="final" && gen.endHours) L.push(`End hours: ${gen.endHours}`);
  if (hasHours) L.push("");

  const hasFuel = gen.startFuel || (mode==="final" && gen.endFuel);
  if (gen.startFuel) L.push(`Start fuel: ${gen.startFuel}%`);
  if (mode==="final" && gen.endFuel) L.push(`End fuel: ${gen.endFuel}%`);
  if (hasFuel) L.push("");

  const hasDEF = gen.startDEF || (mode==="final" && gen.endDEF);
  if (gen.startDEF) L.push(`Start DEF: ${gen.startDEF}%`);
  if (mode==="final" && gen.endDEF) L.push(`End DEF: ${gen.endDEF}%`);
  if (hasDEF) L.push("");

  if (gen.onlineTime && gen.onlineDate) {
    L.push(`Online time: ${gen.onlineTime}`);
    L.push(`Date: ${fmtDate(gen.onlineDate)}`);
  }
  if (mode==="final" && gen.offlineTime && gen.offlineDate) {
    if (gen.onlineTime) L.push("");
    L.push(`Offline time: ${gen.offlineTime}`);
    L.push(`Date: ${fmtDate(gen.offlineDate)}`);
  }

  while (L.length && L[L.length-1]==="") L.pop();
  return L.join("\n");
}

// ── Import parser ─────────────────────────────────────────
function parseImport(text) {
  try {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const start = lines.findIndex(l => l === "GENREPORT-IMPORT");
    const end   = lines.findIndex(l => l === "END-IMPORT");
    if (start === -1 || end === -1) return null;
    const block = lines.slice(start+1, end);
    const jobLine = block.find(l => l.startsWith("job="));
    if (!jobLine) return null;
    const jobNum = jobLine.replace("job=","").trim();
    const xfmrs = block.filter(l => l.startsWith("location=")).map(l => {
      const parts = l.replace("location=","").split("|");
      const gps = parts[1]||"";
      return { xfmrNum: parts[0]||"", address:"", gps, lat: gps.split(",")[0]?.trim()||"", lon: gps.split(",")[1]?.trim()||"", kw: parts[2]||"" };
    });
    return { jobNum, xfmrs };
  } catch(e) { return null; }
}

      onlineTime:row.online_time||"",  onlineDate:row.online_date||todayISO(),
      offlineTime:row.offline_time||"", offlineDate:row.offline_date||todayISO(),
    },
    mode: row.mode||"startup",
  };
}

    mode:g.mode, updated_at:new Date().toISOString(),
  };
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const done = () => { setCopied(true); setTimeout(()=>setCopied(false),1400); };
    const fb = () => { const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); done(); };
    navigator.clipboard ? navigator.clipboard.writeText(text).then(done).catch(fb) : fb();
  };
  return <button onClick={copy} className={`w-full py-3 rounded-lg text-base font-semibold ${copied?"bg-green-600 text-white":"bg-blue-600 text-white"}`}>{copied?"✓ Copied!":"Copy Report"}</button>;

function genLabel(g, allGens) {
  if (!g.xfmr.xfmrNum) return "New";
  if (!allGens) return `Location-${g.xfmr.xfmrNum}`;
  const matches = allGens.filter(x => x.xfmr.xfmrNum===g.xfmr.xfmrNum);
  return matches.length<=1 ? `Location-${g.xfmr.xfmrNum}` : `Location-${g.xfmr.xfmrNum}(${matches.indexOf(g)+1})`;
}

  useEffect(() => { if (!loaded) return; ls.set(UI_KEY, { lastJobId:activeJob?.id||null, lastTab:tab }); }, [activeJob,tab,loaded]);

  useEffect(() => {
    if (!loaded||!activeJob||activeJob.type==="cloud") return;
    saveLocalJob(activeJob);
    setJobIndex(idx => { const u=idx.find(j=>j.id===activeJob.id)?idx.map(j=>j.id===activeJob.id?{...j,jobNum:activeJob.jobNum}:j):idx; saveJobIndex(u); return u; });
  }, [activeJob,loaded]);

  useEffect(() => {
    if (!activeJob||activeJob.type!=="cloud") return;
    const jobNum=activeJob.jobNum;
    const ch=sb.channel(`job-${jobNum}`)
      .on("postgres_changes",{event:"*",schema:"public",table:"cloud_generators",filter:`job_num=eq.${jobNum}`},(payload)=>{
        if (payload.eventType==="INSERT"||payload.eventType==="UPDATE") {
          const g=rowToGen(payload.new);
          setActiveJob(j=>{ if(!j) return j; const ex=j.gens.find(x=>x.id===g.id); return {...j,gens:ex?j.gens.map(x=>x.id===g.id?g:x):[...j.gens,g]}; });
        } else if (payload.eventType==="DELETE") {
          setActiveJob(j=>j?{...j,gens:j.gens.filter(x=>x.id!==payload.old.id)}:j);
        }
      }).subscribe();
    return ()=>sb.removeChannel(ch);
  }, [activeJob?.jobNum, activeJob?.type]);

  const joinCloud = async (jobNum, preloadedGens) => {
    const num = jobNum || cloudNum.trim();
    if (!num) return;
    setCloudLoading(true); setCloudError("");
    try {
      const { data:jobData } = await sb.from("cloud_jobs").select("*").eq("job_num",num).single();
      const isCreator = !jobData;
      if (!jobData) { const token=newToken(); await sb.from("cloud_jobs").insert({job_num:num,creator_token:token}); saveToken(num,token); }
      else if (preloadedGens) { saveToken(num, jobData.creator_token || newToken()); }
      addToCloudIndex(num, isCreator || !!preloadedGens);
      setCloudIndex(loadCloudIndex());
      let gens;
      if (preloadedGens && preloadedGens.length>0) {
        // Import: push all XFMR entries to cloud
        gens = preloadedGens;
        for (const g of gens) { await sb.from("cloud_generators").upsert(genToRow(num,g)); }
      } else {
        const { data:rows } = await sb.from("cloud_generators").select("*").eq("job_num",num);
        gens = rows&&rows.length>0 ? rows.map(rowToGen) : [newGenEntry()];
        if (!rows||rows.length===0) await sb.from("cloud_generators").insert(genToRow(num,gens[0]));
      }
      setActiveJob({id:`cloud-${num}`,jobNum:num,gens,activeGenIdx:0,type:"cloud",created:Date.now()});
      setScreen("entry"); setTab(0); setCloudNum(""); setImportOpen(false); setImportText("");
    } catch(e) { setCloudError("Could not connect. Check your internet and try again."); }
    setCloudLoading(false);
  };

  const handleImport = async () => {
    setImportError("");
    const parsed = parseImport(importText);
    if (!parsed) { setImportError("Could not read import block. Make sure you copied the full GENREPORT-IMPORT section."); return; }
    const gens = parsed.xfmrs.map(x => newGenEntry(x));
    await joinCloud(parsed.jobNum, gens);
  };

  const syncGen = useCallback((jobNum,gen)=>{
    clearTimeout(syncTimers.current[gen.id]);
    syncTimers.current[gen.id]=setTimeout(async()=>{ setSyncing(true); await sb.from("cloud_generators").upsert(genToRow(jobNum,gen)); setSyncing(false); },800);
  },[]);

  const tryAdmin = () => {
    if (adminInput===ADMIN_PASS) { setIsAdmin(true); ls.set("gr-admin","yes"); setAdminPrompt(false); setAdminInput(""); setAdminError(""); loadCloudJobList(); }
    else { setAdminError("Incorrect password"); }
  };
  const loadCloudJobList = async () => { const {data}=await sb.from("cloud_jobs").select("*").order("created_at",{ascending:false}); setCloudJobs(data||[]); };
  const adminLogout = () => { setIsAdmin(false); ls.del("gr-admin"); setCloudJobs([]); };

  const deleteCloudJob = async (jobNum) => {
    await sb.from("cloud_generators").delete().eq("job_num",jobNum);
    await sb.from("cloud_jobs").delete().eq("job_num",jobNum);
    removeToken(jobNum);
    removeFromCloudIndex(jobNum);
    setCloudIndex(loadCloudIndex());
    if (isAdmin) loadCloudJobList();
    if (activeJob?.jobNum===jobNum) { setActiveJob(null); setScreen("jobs"); }
    setConfirm(null);
  };
  const canDeleteCloud = (jobNum) => isAdmin||!!getToken(jobNum);

  const openJob = (id) => { const job=loadLocalJob(id); if (job) { setActiveJob(job); setScreen("entry"); setTab(0); } };
  const createJob = () => {
    const job=newLocalJob(); saveLocalJob(job);
    const idx=[{id:job.id,jobNum:"",created:job.created,type:"local"},...jobIndex];
    setJobIndex(idx); saveJobIndex(idx); setActiveJob(job); setScreen("entry"); setTab(0);
  };
  const deleteLocalJob = (id) => {
    deleteJobData(id); const idx=jobIndex.filter(j=>j.id!==id); setJobIndex(idx); saveJobIndex(idx);
    if (activeJob?.id===id) { setActiveJob(null); setScreen("jobs"); }
    setConfirm(null);
  };

  const safeIdx   = activeJob ? Math.min(activeJob.activeGenIdx,activeJob.gens.length-1) : 0;
  const activeGen = activeJob?.gens[safeIdx]||null;
  const updateJob = (patch) => setActiveJob(j=>({...j,...patch}));
  const updateGens = (fn) => setActiveJob(j=>({...j,gens:fn(j.gens)}));
  const patchActiveGen = (patch) => {
    setActiveJob(j=>{ const gens=j.gens.map((g,i)=>i===safeIdx?{...g,...patch}:g); if(j.type==="cloud") syncGen(j.jobNum,gens[safeIdx]); return {...j,gens}; });
  };
  const updateXfmr = (patch) => patchActiveGen({xfmr:{...activeGen.xfmr,...patch}});
  const updateGen  = (patch) => patchActiveGen({gen:{...activeGen.gen,...patch}});
  const setMode    = (mode)  => patchActiveGen({mode});

  const addGen = async () => {
    const g=newGenEntry(); updateGens(gs=>[...gs,g]); updateJob({activeGenIdx:activeJob.gens.length}); setPickerOpen(false);
    if (activeJob.type==="cloud") await sb.from("cloud_generators").insert(genToRow(activeJob.jobNum,g));
  };
  const deleteGen = async (idx) => {
    const g=activeJob.gens[idx]; updateGens(gs=>gs.filter((_,i)=>i!==idx)); updateJob({activeGenIdx:Math.max(0,Math.min(safeIdx,activeJob.gens.length-2))});
    if (activeJob.type==="cloud") await sb.from("cloud_generators").delete().eq("id",g.id);
    setConfirm(null);
  };
  const clearGen = () => patchActiveGen({gen:{...EMPTY_GEN,onlineDate:todayISO(),offlineDate:todayISO()},mode:"startup"});

  const report = activeJob&&activeGen ? buildReport(activeJob.jobNum, activeGen.xfmr, activeGen.gen, activeGen.mode) : "";
  const isCloud = activeJob?.type==="cloud";
  const myTokens = Object.keys(getTokens());

  if (!loaded) return <div className="min-h-screen flex items-center justify-center text-gray-400" style={{background:"#030712"}}>Loading...</div>;

  // ════════ JOBS SCREEN ════════════════════════════════════
  if (screen==="jobs") return (
    <div className="min-h-screen text-gray-100 pb-24" style={{background:"#030712"}}>
      <div style={{maxWidth:"32rem",margin:"0 auto",padding:"1rem"}}>

        <div className="flex items-center justify-between mb-6">
          <h1 className="text-xl font-bold text-white">Gen Report</h1>
          <div className="flex items-center gap-2">
            {isAdmin ? <button onClick={adminLogout} className="text-xs text-red-400 px-3 py-1.5 bg-gray-800 rounded-lg">Logout Admin</button>
                     : <button onClick={()=>setAdminPrompt(true)} className="text-xs text-gray-500 px-3 py-1.5 bg-gray-800 rounded-lg">Admin</button>}
            <button onClick={createJob} className="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium">+ New Job</button>
          </div>
        </div>

        {/* Admin panel */}
        {isAdmin && (
          <div className="bg-gray-900 border border-yellow-800 rounded-lg p-4 mb-5">
            <div className="flex items-center justify-between mb-3">
              <span className="text-xs font-medium text-yellow-400">☆ Admin — All Cloud Jobs</span>
              <button onClick={loadCloudJobList} className="text-xs text-gray-400 px-2 py-1 bg-gray-800 rounded">Refresh</button>
            </div>
            {cloudJobs.length===0 && <div className="text-gray-600 text-xs">No cloud jobs found</div>}
            {cloudJobs.map(j=>(
              <div key={j.job_num} className="flex items-center justify-between px-3 py-2 bg-gray-800 rounded-lg mb-1">
                <div><span className="font-mono font-bold text-sm text-white">{j.job_num}</span><span className="text-gray-500 text-xs ml-2">{new Date(j.created_at).toLocaleDateString()}</span></div>
                <button onClick={()=>setConfirm({type:"cloudJob",jobNum:j.job_num})} className="text-red-400 text-xs px-2 py-1">✕ Delete</button>
              </div>
            ))}
          </div>
        )}

        {/* Cloud join + import */}
        <div className="bg-gray-900 border border-blue-900 rounded-lg p-4 mb-5">
          <div className="text-xs font-medium text-blue-400 mb-2">☁ Join Cloud Job — shared · real-time</div>
          <div className="flex gap-2 mb-2">
            <input className={ic+" flex-1"} value={cloudNum} onChange={e=>setCloudNum(e.target.value)}
              placeholder="Enter job number" inputMode="numeric" onKeyDown={e=>e.key==="Enter"&&joinCloud()} />
            <button onClick={()=>joinCloud()} disabled={cloudLoading}
              className="px-4 py-3 rounded-lg bg-blue-600 text-white text-sm font-medium flex-shrink-0">
              {cloudLoading?"...":"Join"}
            </button>
          </div>
          <button onClick={()=>setImportOpen(true)}
            className="w-full py-2 rounded-lg bg-gray-800 border border-gray-700 text-gray-400 text-sm">
            📋 Import from Job Summary
          </button>
          {cloudError && <div className="text-red-400 text-xs mt-2">{cloudError}</div>}
          <div className="text-xs text-gray-600 mt-2">First person to enter a number creates it · others join</div>
        </div>

        {/* Cloud jobs list */}
        {cloudIndex.length > 0 && (
          <div className="mb-4">
            <div className="text-xs font-medium text-gray-500 mb-2 uppercase tracking-widest">Cloud Jobs</div>
            {cloudIndex.map(j => (
              <div key={j.jobNum} className="flex items-center bg-gray-900 border border-gray-800 rounded-lg overflow-hidden mb-2">
                <button className="flex-1 text-left px-4 py-4" onClick={() => { setCloudNum(j.jobNum); joinCloud(j.jobNum, null); }}>
                  <div className="font-mono font-bold text-lg text-white">{j.jobNum}</div>
                  <div className="text-xs mt-0.5">
                    <span className="text-blue-400">☁ Cloud</span>
                    {j.isCreator && <span className="text-gray-500 ml-2">· Creator</span>}
                    <span className="text-gray-600 ml-2">{new Date(j.joined).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })}</span>
                  </div>
                </button>
                <button onClick={() => setConfirm({ type:"cloudJob", jobNum:j.jobNum })} className="px-4 py-4 text-red-400 text-sm border-l border-gray-800">✕</button>
              </div>
            ))}
          </div>
        )}

        {/* Local jobs */}
        {jobIndex.length>0 && <div className="text-xs font-medium text-gray-500 mb-2 uppercase tracking-widest">Local Jobs</div>}
        {jobIndex.length===0 && cloudIndex.length===0 && <div className="text-center py-10 text-gray-600 text-sm">No jobs yet</div>}
        <div className="space-y-2">
          {jobIndex.map(j=>(
            <div key={j.id} className="flex items-center bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
              <button className="flex-1 text-left px-4 py-4" onClick={()=>openJob(j.id)}>
                <div className="font-mono font-bold text-lg text-white">{j.jobNum||<span className="text-gray-600">No job number</span>}</div>
                <div className="text-xs text-gray-500 mt-0.5">{new Date(j.created).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
              </button>
              <button onClick={()=>setConfirm({type:"localJob",id:j.id,jobNum:j.jobNum})} className="px-4 py-4 text-red-400 text-sm border-l border-gray-800">✕</button>
            </div>
          ))}
        </div>
      </div>

      {/* Admin login */}
      {adminPrompt && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center px-6" style={{zIndex:60}}>
          <div className="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full" style={{maxWidth:"24rem"}}>
            <div className="text-center text-sm text-gray-400 mb-4">Admin Login</div>
            <input type="password" className={ic+" mb-2"} value={adminInput} onChange={e=>setAdminInput(e.target.value)} placeholder="Password" onKeyDown={e=>e.key==="Enter"&&tryAdmin()} autoFocus />
            {adminError && <div className="text-red-400 text-xs mb-2 text-center">{adminError}</div>}
            <div className="flex gap-3 mt-2">
              <button onClick={()=>{setAdminPrompt(false);setAdminInput("");setAdminError("");}} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
              <button onClick={tryAdmin} className="flex-1 py-3 rounded-lg bg-blue-600 text-white font-medium">Login</button>
            </div>
          </div>
        </div>
      )}

      {/* Import sheet */}
      {importOpen && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-end justify-center" style={{zIndex:50}} onClick={e=>{if(e.target===e.currentTarget){setImportOpen(false);setImportText("");setImportError("");}}}>
          <div className="bg-gray-900 w-full rounded-t-2xl p-4 pb-8" style={{maxWidth:"32rem"}}>
            <div className="text-center text-sm text-gray-300 font-medium mb-1">Import from Job Summary</div>
            <div className="text-center text-xs text-gray-500 mb-3">Paste the GENREPORT-IMPORT block from your Job Summary</div>
            <textarea
              className={ic+" h-40 resize-none text-sm font-mono"}
              value={importText} onChange={e=>setImportText(e.target.value)}
              placeholder=""
            />
            {importError && <div className="text-red-400 text-xs mt-2">{importError}</div>}
            <div className="flex gap-3 mt-3">
              <button onClick={()=>{setImportOpen(false);setImportText("");setImportError("");}} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Cancel</button>
              <button onClick={handleImport} disabled={cloudLoading} className="flex-1 py-3 rounded-lg bg-blue-600 text-white font-medium">{cloudLoading?"Importing...":"Import & Open"}</button>
            </div>
          </div>
        </div>
      )}

      {confirm?.type==="localJob" && <Confirm message={`Delete job ${confirm.jobNum||"this job"}?`} onConfirm={()=>deleteLocalJob(confirm.id)} onCancel={()=>setConfirm(null)} />}
      {confirm?.type==="cloudJob" && <Confirm message={`Delete cloud job ${confirm.jobNum}? All generators will be permanently removed.`} onConfirm={()=>deleteCloudJob(confirm.jobNum)} onCancel={()=>setConfirm(null)} />}
    </div>
  );

  // ════════ ENTRY SCREEN ═══════════════════════════════════
  return (
    <div className="min-h-screen text-gray-100 pb-24" style={{background:"#030712"}}>
      <div style={{maxWidth:"32rem",margin:"0 auto",padding:"1rem"}}>

        <div className="flex items-center gap-3 mb-4">
          <button onClick={()=>setScreen("jobs")} className="text-gray-400 text-sm px-2 py-1 bg-gray-800 rounded-lg flex-shrink-0">← Jobs</button>
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-xs font-semibold tracking-widest uppercase text-gray-500">Job Number</span>
              {isCloud && <span className="text-xs px-2 py-0.5 rounded bg-blue-900 text-blue-300 font-medium">☁ {syncing?"saving...":"live"}</span>}
              {isCloud && canDeleteCloud(activeJob.jobNum) && (
                <button onClick={()=>setConfirm({type:"cloudJob",jobNum:activeJob.jobNum})} className="text-xs text-red-400 px-2 py-0.5 bg-gray-800 rounded ml-auto">Delete Job</button>
              )}
            </div>
            <input className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-xl font-mono font-bold text-white focus:outline-none focus:border-blue-500 placeholder-gray-700"
              value={activeJob.jobNum} onChange={e=>updateJob({jobNum:e.target.value})}
              placeholder="261158" inputMode="numeric" maxLength={10} readOnly={isCloud} />
          </div>
        </div>

        <div className="flex gap-1 mb-5">
          {["Entry","Report"].map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)} className={`flex-1 py-2 text-xs font-medium rounded-lg ${tab===i?"bg-blue-600 text-white":"bg-gray-800 text-gray-400"}`}>{t}</button>
          ))}
        </div>

        {/* ── Entry Tab ── */}
        {tab===0 && activeGen && (
          <div className="space-y-4">

            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-xs font-medium text-blue-400">Location</span>
                <div className="flex items-center gap-2">
                  <button onClick={()=>setPickerOpen(true)} className="flex items-center gap-2 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5">
                    <span className="font-mono font-bold text-sm text-white">{genLabel(activeGen,activeJob.gens)}</span>
                    <span className="text-gray-400 text-2xl leading-none">▾</span>
                  </button>
                  <button onClick={addGen} className="text-xs text-blue-400 font-medium px-2 py-1.5 bg-gray-800 border border-gray-700 rounded-lg">+ New</button>
                </div>
              </div>
              <div className="border-t border-gray-800 pt-3 space-y-3">
                <div className="grid grid-cols-3 gap-3">
                  <Field label="Location #">
                    <div className="flex gap-1 items-center">
                      <input className={ic+(activeGen.xfmr.xfmrNum?" opacity-70":"")} value={activeGen.xfmr.xfmrNum}
                        onChange={e=>updateXfmr({xfmrNum:e.target.value})} readOnly={!!activeGen.xfmr.xfmrNum} inputMode="numeric" />
                      {activeGen.xfmr.xfmrNum && <button onClick={()=>setConfirm({type:"editXfmrNum"})} className="text-gray-400 text-xs px-2 py-3 bg-gray-800 border border-gray-700 rounded-lg flex-shrink-0">Edit</button>}
                    </div>
                  </Field>

                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Latitude">
                    <input className={ic} value={activeGen.xfmr.lat||""}
                      onChange={e=>{
                        const val=e.target.value;
                        if (val.includes(",")) { const [lat,lon]=val.split(",").map(s=>s.trim()); updateXfmr({lat:lat||"",lon:lon||"",gps:lat&&lon?`${lat}, ${lon}`:""}); }
                        else { updateXfmr({lat:val,gps:val&&activeGen.xfmr.lon?`${val}, ${activeGen.xfmr.lon}`:""}); }
                      }} inputMode="decimal" />
                  </Field>
                  <Field label="Longitude">
                    <input className={ic} value={activeGen.xfmr.lon||""} onChange={e=>updateXfmr({lon:e.target.value,gps:activeGen.xfmr.lat&&e.target.value?`${activeGen.xfmr.lat}, ${e.target.value}`:""})} inputMode="decimal" />
                  </Field>
                </div>
              </div>
            </div>

            <div className="flex gap-2">
              <button onClick={()=>setMode("startup")} className={`flex-1 py-2 rounded-lg text-sm font-medium border-2 ${activeGen.mode==="startup"?"bg-green-900 text-green-200 border-green-500":"bg-green-950 text-green-600 border-green-800"}`}>Online</button>
              <button onClick={()=>setMode("final")}   className={`flex-1 py-2 rounded-lg text-sm font-medium border-2 ${activeGen.mode==="final"?"bg-red-900 text-red-200 border-red-500":"bg-red-950 text-red-600 border-red-800"}`}>Offline-Final</button>
            </div>

            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <Field label="Manufacturer / Rental Company"><input className={ic} value={activeGen.gen.manufacturer} onChange={e=>updateGen({manufacturer:e.target.value})} /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Generator Number"><input className={ic} value={activeGen.gen.genNum} onChange={e=>updateGen({genNum:e.target.value})} /></Field>
                <Field label="kW Rating"><input className={ic} value={activeGen.gen.kw} onChange={e=>updateGen({kw:e.target.value})} inputMode="numeric" /></Field>
              </div>
              <Field label="PERP # (CARB blue plate)"><input className={ic} value={activeGen.gen.perp} onChange={e=>updateGen({perp:e.target.value})} inputMode="numeric" /></Field>
            </div>

            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <div className="text-xs font-medium text-green-400">Start Data</div>
              <div className="grid grid-cols-3 gap-2">
                <Field label="Start Hours"><input className={ic} value={activeGen.gen.startHours} onChange={e=>updateGen({startHours:e.target.value})} inputMode="decimal" /></Field>
                <Field label="Fuel %"><input className={ic} value={activeGen.gen.startFuel} onChange={e=>updateGen({startFuel:e.target.value})} inputMode="numeric" /></Field>
                <Field label="DEF %"><input className={ic} value={activeGen.gen.startDEF} onChange={e=>updateGen({startDEF:e.target.value})} inputMode="numeric" /></Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Online Time (24hr)"><TimePicker value={activeGen.gen.onlineTime} onChange={v=>updateGen({onlineTime:v})} label="Online Time" /></Field>
                <Field label="Online Date"><input type="date" className={ic} value={activeGen.gen.onlineDate} onChange={e=>updateGen({onlineDate:e.target.value})} /></Field>
              </div>
            </div>

            {activeGen.mode==="final" && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
                <div className="text-xs font-medium text-red-400">End Data</div>
                <div className="grid grid-cols-3 gap-2">
                  <Field label="End Hours"><input className={ic} value={activeGen.gen.endHours} onChange={e=>updateGen({endHours:e.target.value})} inputMode="decimal" /></Field>
                  <Field label="Fuel %"><input className={ic} value={activeGen.gen.endFuel} onChange={e=>updateGen({endFuel:e.target.value})} inputMode="numeric" /></Field>
                  <Field label="DEF %"><input className={ic} value={activeGen.gen.endDEF} onChange={e=>updateGen({endDEF:e.target.value})} inputMode="numeric" /></Field>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Offline Time (24hr)"><TimePicker value={activeGen.gen.offlineTime} onChange={v=>updateGen({offlineTime:v})} label="Offline Time" /></Field>
                  <Field label="Offline Date"><input type="date" className={ic} value={activeGen.gen.offlineDate} onChange={e=>updateGen({offlineDate:e.target.value})} /></Field>
                </div>
              </div>
            )}

            {activeJob.gens.length>1 && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-3 space-y-1">
                <div className="text-xs font-medium text-gray-500 mb-2">All Generators — <span className="font-mono text-gray-400">{activeJob.jobNum||"—"}</span>{isCloud&&<span className="ml-2 text-blue-400">☁</span>}</div>
                {activeJob.gens.map((g,i)=>(
                  <div key={g.id} className={`flex items-center justify-between px-3 py-2 rounded-lg ${i===safeIdx?"bg-blue-600 bg-opacity-20 border border-blue-500 border-opacity-30":"bg-gray-800"}`}>
                    <button className="flex-1 text-left" onClick={()=>updateJob({activeGenIdx:i})}>
                      <span className={`font-mono font-bold text-sm ${i===safeIdx?"text-blue-300":"text-gray-200"}`}>{genLabel(g,activeJob.gens)}</span>
                      <span className={`ml-2 text-xs px-1.5 py-0.5 rounded ${g.mode==="final"?"bg-red-900 text-red-300":"bg-green-900 text-green-300"}`}>{g.mode==="final"?"Final":"Online"}</span>
                    </button>
                    <button onClick={()=>setConfirm({type:"gen",idx:i})} className="text-red-400 text-xs px-2 py-1 ml-1">✕</button>
                  </div>
                ))}
              </div>
            )}

            <button onClick={()=>setTab(1)} className="w-full py-3 rounded-lg bg-blue-600 text-white text-base font-medium">View Report →</button>
            <button onClick={clearGen} className="w-full py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-500 text-sm">Clear This Generator's Data</button>
          </div>
        )}

        {/* ── Report Tab ── */}
        {tab===1 && activeGen && (
          <div className="space-y-4">
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
              <div className="flex items-center justify-between mb-3">
                <span className="text-xs font-medium text-gray-400">{activeGen.mode==="final"?"Final":"Startup"} — {genLabel(activeGen,activeJob.gens)}</span>
                <span className="text-xs font-mono text-gray-600">{activeJob.jobNum||"—"}</span>
              </div>
              <pre className="text-sm text-gray-200 whitespace-pre-wrap font-mono leading-relaxed select-all">{report||"No data yet.\n\nFill in the Entry tab first."}</pre>
            </div>
            {report && <CopyButton text={report} />}
            {activeJob.gens.length>1 && (
              <div className="bg-gray-900 border border-gray-800 rounded-lg p-3">
                <div className="text-xs font-medium text-gray-400 mb-2">Switch Generator</div>
                <div className="flex flex-wrap gap-2">
                  {activeJob.gens.map((g,i)=>(
                    <button key={g.id} onClick={()=>updateJob({activeGenIdx:i})} className={`px-3 py-2 rounded-lg text-sm font-mono font-medium ${i===safeIdx?"bg-blue-600 text-white":"bg-gray-800 text-gray-300"}`}>
                      {genLabel(g,activeJob.gens)}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <button onClick={()=>setTab(0)} className="w-full py-3 rounded-lg bg-gray-800 text-gray-300 text-base font-medium">← Edit Entry</button>
          </div>
        )}
      </div>

      {/* Gen picker */}
      {pickerOpen && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-end justify-center" style={{zIndex:50}} onClick={e=>{if(e.target===e.currentTarget) setPickerOpen(false);}}>
          <div className="bg-gray-900 w-full rounded-t-2xl p-4 pb-8" style={{maxWidth:"32rem",maxHeight:"80vh"}}>
            <div className="text-center text-sm text-gray-400 mb-1">Select Generator</div>
            <div className="text-center text-xs text-gray-600 mb-3 font-mono">Job {activeJob.jobNum||"—"}</div>
            <div className="overflow-y-auto space-y-1 no-scrollbar" style={{maxHeight:"52vh"}}>
              {activeJob.gens.map((g,i)=>(
                <button key={g.id} onClick={()=>{updateJob({activeGenIdx:i});setPickerOpen(false);}}
                  className={`w-full flex items-center justify-between px-4 py-3 rounded-lg ${i===safeIdx?"bg-blue-600 bg-opacity-30 text-blue-300 border border-blue-500 border-opacity-50":"bg-gray-800 text-gray-300"}`}>
                  <span className="font-mono font-bold text-base">{genLabel(g,activeJob.gens)}</span>
                  <span className={`text-xs px-2 py-0.5 rounded ml-2 flex-shrink-0 ${g.mode==="final"?"bg-red-900 text-red-300":"bg-green-900 text-green-300"}`}>{g.mode==="final"?"Final":"Online"}</span>
                </button>
              ))}
            </div>
            <div className="flex gap-3 mt-3">
              <button onClick={addGen} className="flex-1 py-3 rounded-lg bg-blue-600 bg-opacity-20 border border-blue-500 border-opacity-30 text-blue-300 font-medium">+ Add Generator</button>
              <button onClick={()=>setPickerOpen(false)} className="flex-1 py-3 rounded-lg bg-gray-800 text-gray-300 font-medium">Close</button>
            </div>
          </div>
        </div>
      )}

      {confirm?.type==="editXfmrNum" && <Confirm message="Clear the Location # so you can edit it?" confirmLabel="Clear" onConfirm={()=>{updateXfmr({xfmrNum:""});setConfirm(null);}} onCancel={()=>setConfirm(null)} />}
      {confirm?.type==="gen"        && <Confirm message={`Delete ${genLabel(activeJob.gens[confirm.idx],activeJob.gens)}?`} onConfirm={()=>deleteGen(confirm.idx)} onCancel={()=>setConfirm(null)} />}
      {confirm?.type==="cloudJob"   && <Confirm message={`Delete cloud job ${confirm.jobNum}? All generators will be permanently removed.`} onConfirm={()=>deleteCloudJob(confirm.jobNum)} onCancel={()=>setConfirm(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
